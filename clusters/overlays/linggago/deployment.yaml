apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      securityContext:
        fsGroup: 1000
      serviceAccountName: minecraft-sa
      volumes:
        - name: world-data
          persistentVolumeClaim:
            claimName: world-data
        - name: backup
          persistentVolumeClaim:
            claimName: backup-pvc
        - name: overrides
          persistentVolumeClaim:
            claimName: overrides-storage
        - name: server-properties
          configMap:
            name: mc-server-properties
            defaultMode: 0755
        - name: startserver
          configMap:
            name: startserver
            defaultMode: 0755
        - name: user-jvm-args
          configMap:
            name: user-jvm-args
            defaultMode: 0755
        - name: mcrcon-commands
          configMap:
            name: minecraft-commands
            defaultMode: 0755
      containers:
        - name: minecraft
          image: "docker.io/chrisroth667/minecraft:0.0.0"
          imagePullPolicy: Always
          ports:
            - containerPort: 25565
              protocol: TCP
          env:
            - name: EULA
              value: "true"
          envFrom:
            - secretRef:
                name: mc-env
          command: ["/bin/bash","-lc"]
          args: ["/data/startserver.sh"]
          volumeMounts:
            - name: mcrcon-commands
              mountPath: /data/commands.txt
              subPath: commands.txt
            - name: world-data
              mountPath: /data/world
            - name: overrides
              mountPath: /data/overrides
            - name: backup
              mountPath: /data/simplebackups
            - name: startserver
              mountPath: /data/startserver.sh
              subPath: startserver.sh
            - name: server-properties
              mountPath: /data/server.properties
              subPath: server.properties
            - name: user-jvm-args
              mountPath: /data/user-jvm-args.txt
              subPath: user-jvm-args.txt
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
