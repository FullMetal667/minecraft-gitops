kind: ConfigMap
apiVersion: v1
metadata:
  name: startserver
  namespace: minecraft-linggago
data:
  startserver.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    # ---- Paths ----
    APP_DIR="${APP_DIR:-/srv/mc}"   # im Image (falls du Serverpack ins Image gelegt hast)
    DATA_DIR="${DATA_DIR:-/data}"   # PVC / runtime

    # Marker für einmalige Initialisierung
    LINGGAGO_INIT_MARKER="${LINGGAGO_INIT_MARKER:-/tmp/.linggago_initialized}"

    # ---- Minecraft / Forge ----
    MC_VERSION="${MC_VERSION:-1.20.1}"
    FORGE_VERSION="${FORGE_VERSION:-47.2.0}"
    FORGE_INSTALLER="forge-${MC_VERSION}-${FORGE_VERSION}-installer.jar"
    FORGE_URL="https://maven.minecraftforge.net/net/minecraftforge/forge/${MC_VERSION}-${FORGE_VERSION}/forge-${MC_VERSION}-${FORGE_VERSION}-installer.jar"

    # Pfad zu Forge unix_args (wird nach installServer erzeugt)
    FORGE_UNIX_ARGS="libraries/net/minecraftforge/forge/${MC_VERSION}-${FORGE_VERSION}/unix_args.txt"

    # ---- Optional: SimpleBackups (wenn du es wirklich willst) ----
    # Standard: none (weil die ATM10-Version im Beispiel 1.21 war)
    BACKUP_MOD="${BACKUP_MOD:-none}"

    # Beispielwerte (MÜSSEN ggf. zu MC 1.20.1 passen, sonst BACKUP_MOD=none lassen!)
    AB_FILE_ID="${AB_FILE_ID:-0}"
    AB_FILE_NAME="${AB_FILE_NAME:-}"
    AB_DIR1=$(( AB_FILE_ID / 1000 ))
    AB_DIR2=$(( AB_FILE_ID % 1000 ))
    ADVANCED_BACKUPS_URL="${ADVANCED_BACKUPS_URL:-https://mediafilez.forgecdn.net/files/${AB_DIR1}/${AB_DIR2}/${AB_FILE_NAME}}"

    selected_backup_filename() {
      case "${BACKUP_MOD}" in
        advanced) echo "${AB_FILE_NAME}" ;;
        none|"")  echo "" ;;
      esac
    }

    selected_backup_url() {
      case "${BACKUP_MOD}" in
        advanced) echo "${ADVANCED_BACKUPS_URL}" ;;
        none|"")  echo "" ;;
      esac
    }

    stage_backup_mod() {
      local fname url
      fname="$(selected_backup_filename)"
      url="$(selected_backup_url)"
      [[ -n "${fname}" ]] || return 0

      mkdir -p "${DATA_DIR}/overlays/mods"

      if [[ -f "${DATA_DIR}/overlays/mods/${fname}" ]]; then
        return 0
      fi

      if [[ -f "${DATA_DIR}/${fname}" ]]; then
        cp -n "${DATA_DIR}/${fname}" "${DATA_DIR}/overlays/mods/${fname}" 2>/dev/null || true
        return 0
      fi

      if [[ -n "${url}" ]]; then
        echo "[BK] downloading ${fname} from ${url}"
        if ! curl -fsSL "${url}" -o "${DATA_DIR}/overlays/mods/${fname}"; then
          echo "[BK] WARN: download failed for ${fname} (continuing without backup mod)"
          rm -f "${DATA_DIR}/overlays/mods/${fname}" || true
        fi
      fi
    }

    place_backup_mod() {
      local fname src
      fname="$(selected_backup_filename)"
      [[ -n "${fname}" ]] || return 0

      mkdir -p "${DATA_DIR}/mods"

      if [[ -f "${DATA_DIR}/overlays/mods/${fname}" ]]; then
        src="${DATA_DIR}/overlays/mods/${fname}"
      else
        return 0
      fi

      if [[ -f "${DATA_DIR}/mods/${fname}" ]]; then
        echo "[BK] ${fname} bereits in mods/ vorhanden – nichts überschrieben."
        return 0
      fi

      cp -n "${src}" "${DATA_DIR}/mods/${fname}" 2>/dev/null || true
    }

    # ---- RCON ----
    RCON_ENABLE="${RCON_ENABLE:-true}"
    RCON_HOST="${RCON_HOST:-127.0.0.1}"
    RCON_PORT="${RCON_PORT:-25575}"
    RCON_PASSWORD="${RCON_PASSWORD:-mc321}"
    RCON_WAIT_SECS="${RCON_WAIT_SECS:-1800}"
    RCON_POLL_INTERVAL="${RCON_POLL_INTERVAL:-5}"

    # ---- nc / ncat detection ----
    NC_BIN="${NC_BIN:-nc}"
    if ! command -v "${NC_BIN}" >/dev/null 2>&1; then
      if command -v ncat >/dev/null 2>&1; then
        NC_BIN="ncat"
      fi
    fi

    mkdir -p "${DATA_DIR}"
    cd "${DATA_DIR}"

    # ============================================================
    # 0) Initialisierung: Serverpack einmalig von APP_DIR -> /data
    # ============================================================
    if [[ ! -f "${LINGGAGO_INIT_MARKER}" ]]; then
      if [[ -d "${APP_DIR}" ]]; then
        echo "[LINGGAGO] Erste Initialisierung von /data aus ${APP_DIR} ..."
        shopt -s dotglob
        cp -an "${APP_DIR}/"* "${DATA_DIR}/" 2>/dev/null || true
        shopt -u dotglob
      else
        echo "[LINGGAGO] WARN: APP_DIR=${APP_DIR} existiert nicht – nichts zu kopieren."
      fi
      touch "${LINGGAGO_INIT_MARKER}"
    fi

    # =======================
    # EULA
    # =======================
    if [ ! -f eula.txt ] || ! grep -q 'eula=true' eula.txt; then
      if [ "${EULA:-}" = "TRUE" ] || [ "${EULA:-}" = "true" ]; then
        {
          echo "# By changing the setting below to TRUE you are indicating your agreement to the EULA (https://aka.ms/MinecraftEULA)."
          echo "# $(date -u)"
          echo "eula=true"
        } > eula.txt
        echo "[init] EULA accepted via ENV"
      else
        echo "[init] EULA not accepted. Setze ENV EULA=true oder lege /data/eula.txt mit 'eula=true' an."
        exit 3
      fi
    fi

    # =======================
    # Java prüfen (MC 1.20.1 => Java 17)
    # =======================
    if ! command -v "${MC_JAVA:-java}" >/dev/null 2>&1; then
      echo "[LINGGAGO] Java not found (MC_JAVA oder java)"
      exit 1
    fi

    JAVA_MAJOR="$("${MC_JAVA:-java}" -version 2>&1 | awk -F\" '/version/ {print $2}' | cut -d. -f1)"
    if [[ -z "${JAVA_MAJOR}" || ! "${JAVA_MAJOR}" =~ ^[0-9]+$ || "${JAVA_MAJOR}" -lt 17 ]]; then
      echo "[LINGGAGO] Minecraft ${MC_VERSION} requires Java 17+ - found Java ${JAVA_MAJOR:-unknown}"
      exit 1
    fi

    # =======================
    # Forge installieren (falls libraries/ oder unix_args fehlt)
    # =======================
    if [[ ! -f "${FORGE_UNIX_ARGS}" ]]; then
      echo "[LINGGAGO] Forge not installed (missing ${FORGE_UNIX_ARGS}), installing now."
      if [[ ! -f "${FORGE_INSTALLER}" ]]; then
        echo "[LINGGAGO] Downloading Forge installer: ${FORGE_URL}"
        if command -v wget >/dev/null 2>&1; then
          wget -O "${FORGE_INSTALLER}" "${FORGE_URL}"
        elif command -v curl >/dev/null 2>&1; then
          curl -fsSL -o "${FORGE_INSTALLER}" "${FORGE_URL}"
        else
          echo "[LINGGAGO] Neither wget nor curl found in container."
          exit 1
        fi
      fi
      echo "[LINGGAGO] Running Forge installer."
      "${MC_JAVA:-java}" -jar "${FORGE_INSTALLER}" --installServer
    fi

    # Standard server.properties, falls nicht vorhanden (wird bei dir aber gemountet)
    if [[ ! -e server.properties ]]; then
      cat > server.properties <<EOF
    allow-flight=true
    motd=Linggango V6.3
    max-tick-time=180000
    EOF
    fi

    # Nur installieren, nicht starten?
    if [[ "${LINGGAGO_INSTALL_ONLY:-false}" == "true" ]]; then
      echo "[LINGGAGO] INSTALL_ONLY: complete"
      exit 0
    fi

    # =======================
    # Optional: Backup-Mod staged + placed
    # =======================
    stage_backup_mod || true
    place_backup_mod || true

    # =======================
    # Hauptloop: Server starten + RCON-Commands
    # =======================
    while true; do
      echo "[LINGGAGO] starting server ..."

      # user-jvm-args wird bei dir als /data/user-jvm-args.txt gemountet
      if [[ -f "${DATA_DIR}/user-jvm-args.txt" ]]; then
        "${MC_JAVA:-java}" @"${DATA_DIR}/user-jvm-args.txt" @"${FORGE_UNIX_ARGS}" nogui &
      else
        "${MC_JAVA:-java}" @"${FORGE_UNIX_ARGS}" nogui &
      fi
      SERVER_PID=$!

      # Nach RCON-Start commands.txt schießen
      if [[ "${RCON_ENABLE}" == "true" && -s "${DATA_DIR}/commands.txt" ]]; then
        echo "[RCON] waiting for ${RCON_HOST}:${RCON_PORT} (timeout ${RCON_WAIT_SECS}s) ..."
        waited=0
        until command -v "${NC_BIN}" >/dev/null 2>&1 && ${NC_BIN} -z "${RCON_HOST}" "${RCON_PORT}" 2>/dev/null; do
          sleep "${RCON_POLL_INTERVAL}"
          waited=$(( waited + RCON_POLL_INTERVAL ))
          if [[ "${waited}" -ge "${RCON_WAIT_SECS}" ]]; then
            echo "[RCON] timeout (${RCON_WAIT_SECS}s) – skip commands"
            break
          fi
        done

        if command -v "${NC_BIN}" >/dev/null 2>&1 && ${NC_BIN} -z "${RCON_HOST}" "${RCON_PORT}" 2>/dev/null; then
          sleep 3
          echo "[RCON] sending commands from commands.txt"
          sed -e 's#^/##' -e '/^\s*#/d' -e '/^\s*$/d' "${DATA_DIR}/commands.txt" | \
            /usr/local/bin/mcrcon -H "${RCON_HOST}" -P "${RCON_PORT}" -p "${RCON_PASSWORD}" -s || true
        fi
      fi

      wait "${SERVER_PID}" || true

      if [[ "${LINGGAGO_RESTART:-true}" == "false" ]]; then
        echo "[LINGGAGO] server stopped, automatic restart disabled (LINGGAGO_RESTART=false)"
        exit 0
      fi

      echo "[LINGGAGO] Restarting automatically in 10 seconds"
      sleep 10
    done

