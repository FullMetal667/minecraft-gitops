apiVersion: apps/v1
kind: Deployment
metadata:
  name: better-minecraft-4
  namespace: minecraft-bmc4
spec:
  template:
    spec:
      containers:
      - name: minecraft
        resources:
          requests:
            cpu: "4"
            memory: "12Gi"
