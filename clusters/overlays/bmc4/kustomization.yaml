apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: minecraft-bmc4
resources:
  - ../../base
  - namespace.yaml
  - cm-mcrcon.yaml
  - cm-server-properties.yaml
  - cm-user-jvm-args.yaml
  - cm-startserver.yaml
  - deployment.yaml
  - cm-variables.yaml
secretGenerator:
  - name: mc-env
    envs:
      - mc-env.env
    type: Opaque
patches:
  - path: patch-resources.yaml
    target:
      kind: Deployment
      name: better-mc-4
      namespace: minecraft-bmc4
  - path: patch-delete-minecraft-container.yaml
    target:
      name: better-mc-4
      namespace: minecraft-bmc4
images: 
  - name: docker.io/chrisroth667/minecraft
    newName: docker.io/chrisroth667/bmc4
    newTag: v57.5