kind: ConfigMap
apiVersion: v1
metadata:
  name: start
data:
  start.sh: |
    #!/usr/bin/env bash
    set -uo pipefail

    ############################################LICENSE#################################################
    # Copyright (C) 2024  Griefed
    #
    # This script is free software; you can redistribute it and/or
    # modify it under the terms of the GNU Lesser General Public
    # License as published by the Free Software Foundation; either
    # version 2.1 of the License, or (at your option) any later version.
    #
    # This library is distributed in the hope that it will be useful,
    # but WITHOUT ANY WARRANTY; without even the implied warranty of
    # MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the GNU
    # Lesser General Public License for more details.
    #
    # You should have received a copy of the GNU Lesser General Public
    # License along with this library; if not, write to the Free Software
    # Foundation, Inc., 51 Franklin Street, Fifth Floor, Boston, MA  02110-1301
    # USA
    #
    # The full license can be found at:
    # https://github.com/Griefed/ServerPackCreator/blob/main/LICENSE
    ############################################DESCRIPTION#################################################
    #
    # Start script to easily run your server pack.
    # Adapted for container/OpenShift environments with ConfigMap-backed read-only config files.
    #
    #######################################################################################################

    pause() {
      if [[ -t 0 ]]; then
        read -n 1 -s -r -p "Press any key to continue"
        echo ""
      fi
    }

    crashServer() {
      echo "${1}" >&2
      pause
      exit 1
    }

    commandAvailable() {
      command -v "$1" >/dev/null 2>&1
    }

    getJavaVersion() {
      JAVA_VERSION=$("${JAVA}" -fullversion 2>&1 | awk -F '"' '/version/ {print $2}' | cut -d'.' -f1)
      if [[ "${JAVA_VERSION:-}" == "1" ]]; then
        JAVA_VERSION=$("${JAVA}" -fullversion 2>&1 | awk -F '"' '/version/ {print $2}' | cut -d'.' -f2)
      fi
    }

    installJava() {
      echo "No suitable Java installation was found on your system. Proceeding to Java installation."
      . ./install_java.sh || crashServer "Java install-script failed. Install Java ${RECOMMENDED_JAVA_VERSION} manually or edit JAVA in your variables.txt to point to a Java installation of said version."
      if ! commandAvailable "$JAVA"; then
        crashServer "Java installation failed. Couldn't find $JAVA."
      fi
    }

    downloadIfNotExist() {
      local fileToCheck="$1"
      local fileToDownload="$2"
      local downloadURL="$3"

      if [[ ! -s "${fileToCheck}" ]]; then
        echo "${fileToCheck} could not be found." >&2
        echo "Downloading $(basename "${fileToDownload}")" >&2
        echo "from ${downloadURL}" >&2

        mkdir -p "$(dirname "${fileToDownload}")" || return 1

        if commandAvailable curl; then
          curl -fL --retry 3 -o "${fileToDownload}" "${downloadURL}" || return 1
        elif commandAvailable wget; then
          wget -O "${fileToDownload}" "${downloadURL}" || return 1
        else
          crashServer "[ERROR] wget or curl is required to download files."
        fi

        if [[ -s "${fileToDownload}" ]]; then
          echo "Download complete." >&2
          echo "true"
        else
          echo "false"
          return 1
        fi
      else
        echo "${fileToCheck} present." >&2
        echo "false"
      fi
    }

    runJavaCommand() {
      # shellcheck disable=SC2086
      "$JAVA" ${1}
    }

    # RCON defaults
    RCON_ENABLE="${RCON_ENABLE:-true}"
    RCON_HOST="${RCON_HOST:-127.0.0.1}"
    RCON_PORT="${RCON_PORT:-25575}"
    RCON_PASSWORD="${RCON_PASSWORD:-mc321}"
    RCON_WAIT_SECS="${RCON_WAIT_SECS:-600}"
    RCON_POLL_INTERVAL="${RCON_POLL_INTERVAL:-5}"
    COMMANDS_FILE="${COMMANDS_FILE:-commands.txt}"

    # Backup-Mod Auswahl: advanced | none
    # Default auf NONE, da das unten eingetragene Beispiel ein Fabric-Mod ist und auf Forge Ärger macht.
    BACKUP_MOD="${BACKUP_MOD:-none}"

    # AdvancedBackups Defaults (per ENV overridebar)
    AB_FILE_ID="${AB_FILE_ID:-4818556}"
    AB_FILE_NAME="${AB_FILE_NAME:-AdvancedBackups-fabric-1.20-3.2.1.jar}"
    AB_DIR1=$(( AB_FILE_ID / 1000 ))
    AB_DIR2=$(( AB_FILE_ID % 1000 ))
    ADVANCED_BACKUPS_URL="${ADVANCED_BACKUPS_URL:-https://mediafilez.forgecdn.net/files/${AB_DIR1}/${AB_DIR2}/${AB_FILE_NAME}}"

    NC_BIN="${NC_BIN:-nc}"
    if ! command -v "${NC_BIN}" >/dev/null 2>&1; then
      if command -v ncat >/dev/null 2>&1; then
        NC_BIN="ncat"
      fi
    fi

    selected_backup_filename() {
      case "${BACKUP_MOD}" in
        advanced) echo "${AB_FILE_NAME}" ;;
        none|"")  echo "" ;;
      esac
    }

    selected_backup_url() {
      case "${BACKUP_MOD}" in
        advanced) echo "${ADVANCED_BACKUPS_URL}" ;;
        none|"")  echo "" ;;
      esac
    }

    configure_rcon_server_properties() {
      if [[ "${RCON_ENABLE}" != "true" ]]; then
        echo "[RCON] disabled via RCON_ENABLE=${RCON_ENABLE}"
        return 0
      fi

      if [[ ! -f server.properties ]]; then
        echo "[RCON] WARN: server.properties nicht vorhanden – überspringe automatische RCON-Konfiguration."
        return 0
      fi

      echo "[RCON] server.properties wird nicht verändert (ConfigMap-Modus aktiv)."
      echo "[RCON] Bitte sicherstellen, dass folgende Werte bereits gesetzt sind:"
      echo "       enable-rcon=true"
      echo "       rcon.port=${RCON_PORT}"
      echo "       rcon.password=<passend zu RCON_PASSWORD>"
    }

    stage_backup_mod() {
      local fname url
      fname="$(selected_backup_filename)"
      url="$(selected_backup_url)"
      [[ -n "${fname}" ]] || return 0

      mkdir -p overrides/mods mods

      if [[ -f "overrides/mods/${fname}" ]]; then
        return 0
      fi

      local src=""
      if [[ -f "extras/${fname}" ]]; then
        src="extras/${fname}"
      elif [[ -f "${fname}" ]]; then
        src="${fname}"
      fi

      if [[ -z "${src}" && -n "${url}" ]]; then
        echo "[BK] downloading ${fname} from ${url}"
        if commandAvailable curl; then
          if ! curl -fsSL "${url}" -o "overrides/mods/${fname}"; then
            echo "[BK] WARN: download failed for ${fname} (continuing)"
            return 0
          fi
        elif commandAvailable wget; then
          if ! wget -q -O "overrides/mods/${fname}" "${url}"; then
            echo "[BK] WARN: download failed for ${fname} (continuing)"
            return 0
          fi
        else
          echo "[BK] WARN: neither curl nor wget available – skipping backup mod download"
          return 0
        fi
        return 0
      fi

      if [[ -n "${src}" ]]; then
        cp -f "${src}" "overrides/mods/${fname}" || true
      fi
    }

    place_backup_mod() {
      local fname src=""
      fname="$(selected_backup_filename)"
      [[ -n "${fname}" ]] || return 0

      if [[ -f "overrides/mods/${fname}" ]]; then
        src="overrides/mods/${fname}"
      elif [[ -f "extras/${fname}" ]]; then
        src="extras/${fname}"
      elif [[ -f "${fname}" ]]; then
        src="${fname}"
      fi

      if [[ -n "${src}" ]]; then
        mkdir -p mods
        cp -f "${src}" "mods/${fname}" || true
        echo "[BK] Backup-Mod im mods/-Ordner platziert: ${fname}"
      fi
    }

    send_rcon_commands() {
      if [[ "${RCON_ENABLE}" != "true" ]]; then
        echo "[RCON] disabled via RCON_ENABLE=${RCON_ENABLE}"
        return 0
      fi

      if [[ ! -s "${COMMANDS_FILE}" ]]; then
        echo "[RCON] no commands file '${COMMANDS_FILE}' – skipping"
        return 0
      fi

      if ! command -v /usr/local/bin/mcrcon >/dev/null 2>&1; then
        echo "[RCON] /usr/local/bin/mcrcon not found – skipping"
        return 0
      fi

      echo "[RCON] waiting for ${RCON_HOST}:${RCON_PORT} (timeout ${RCON_WAIT_SECS}s) ..."
      local waited=0

      while (( waited < RCON_WAIT_SECS )); do
        if command -v "${NC_BIN}" >/dev/null 2>&1 && ${NC_BIN} -z "${RCON_HOST}" "${RCON_PORT}" 2>/dev/null; then
          echo "[RCON] RCON port is up"
          break
        fi
        sleep "${RCON_POLL_INTERVAL}"
        waited=$(( waited + RCON_POLL_INTERVAL ))
      done

      if (( waited >= RCON_WAIT_SECS )); then
        echo "[RCON] timeout after ${RCON_WAIT_SECS}s – skipping commands"
        return 0
      fi

      sleep 3
      echo "[RCON] sending commands from ${COMMANDS_FILE}"

      sed -e 's#^/##' -e '/^\s*#/d' -e '/^\s*$/d' "${COMMANDS_FILE}" | \
        /usr/local/bin/mcrcon \
          -H "${RCON_HOST}" \
          -P "${RCON_PORT}" \
          -p "${RCON_PASSWORD}" \
          -s || echo "[RCON] mcrcon returned non-zero (some commands may have failed)"
    }

    refreshServerJar() {
      if [[ "${SERVERSTARTERJAR_FORCE_FETCH}" == "true" ]]; then
        rm -f "${SERVERSTARTERJAR_PATH}"
      fi

      if [[ "${SERVERSTARTERJAR_VERSION}" == "latest" ]]; then
        SERVERSTARTERJAR_DOWNLOAD_URL="https://github.com/neoforged/ServerStarterJar/releases/latest/download/server.jar"
      else
        SERVERSTARTERJAR_DOWNLOAD_URL="https://github.com/neoforged/ServerStarterJar/releases/download/${SERVERSTARTERJAR_VERSION}/server.jar"
      fi

      downloadIfNotExist "${SERVERSTARTERJAR_PATH}" "${SERVERSTARTERJAR_PATH}" "${SERVERSTARTERJAR_DOWNLOAD_URL}" >/dev/null || \
        crashServer "ERROR! Download von server.jar fehlgeschlagen."

      if [[ ! -s "${SERVERSTARTERJAR_PATH}" ]]; then
        crashServer "ERROR! server.jar konnte nicht heruntergeladen oder gefunden werden. URL: ${SERVERSTARTERJAR_DOWNLOAD_URL}"
      fi
    }

    setupForge() {
      echo ""
      echo "Running Forge checks and setup..."
      FORGE_INSTALLER_URL="https://files.minecraftforge.net/maven/net/minecraftforge/forge/${MINECRAFT_VERSION}-${MODLOADER_VERSION}/forge-${MINECRAFT_VERSION}-${MODLOADER_VERSION}-installer.jar"
      FORGE_JAR_LOCATION="do_not_manually_edit"

      if [[ ${SEMANTICS[1]} -le 16 ]]; then
        FORGE_JAR_LOCATION="forge.jar"
        LAUNCHER_JAR_LOCATION="forge.jar"
        SERVER_RUN_COMMAND="${JAVA_ARGS} -jar ${LAUNCHER_JAR_LOCATION} nogui"

        if [[ $(downloadIfNotExist "${FORGE_JAR_LOCATION}" "forge-installer.jar" "${FORGE_INSTALLER_URL}") == "true" ]]; then
          echo "Forge Installer downloaded. Installing..."
          runJavaCommand "-jar forge-installer.jar --installServer"

          echo "Renaming forge-${MINECRAFT_VERSION}-${MODLOADER_VERSION}.jar to forge.jar"
          mv "forge-${MINECRAFT_VERSION}-${MODLOADER_VERSION}.jar" forge.jar 2>/dev/null || true
          mv "forge-${MINECRAFT_VERSION}-${MODLOADER_VERSION}-universal.jar" forge.jar 2>/dev/null || true

          if [[ -s "${FORGE_JAR_LOCATION}" ]]; then
            rm -f forge-installer.jar
            echo "Installation complete. forge-installer.jar deleted."
          else
            rm -f forge-installer.jar
            crashServer "Something went wrong during the server installation. Please try again in a couple of minutes and check your internet connection."
          fi
        fi
      else
        if [[ ! -s "user_jvm_args.txt" ]]; then
          crashServer "ERROR! user_jvm_args.txt fehlt. Im ConfigMap-Modus muss diese Datei bereitgestellt werden."
        fi

        if [[ "${USE_SSJ}" == "false" ]]; then
          FORGE_JAR_LOCATION="libraries/net/minecraftforge/forge/${MINECRAFT_VERSION}-${MODLOADER_VERSION}/forge-${MINECRAFT_VERSION}-${MODLOADER_VERSION}-server.jar"
          SERVER_RUN_COMMAND="@user_jvm_args.txt @libraries/net/minecraftforge/forge/${MINECRAFT_VERSION}-${MODLOADER_VERSION}/unix_args.txt nogui"
          if [[ $(downloadIfNotExist "${FORGE_JAR_LOCATION}" "forge-installer.jar" "${FORGE_INSTALLER_URL}") == "true" ]]; then
            echo "Forge Installer downloaded. Installing..."
            runJavaCommand "-jar forge-installer.jar --installServer"
          fi
        else
          SERVER_RUN_COMMAND="@user_jvm_args.txt -Djava.security.manager=allow -jar ${SERVERSTARTERJAR_PATH} --installer-force --installer ${FORGE_INSTALLER_URL} nogui"
          refreshServerJar
        fi
      fi
    }

    setupNeoForge() {
      echo ""
      echo "Running NeoForge checks and setup..."
      echo "Using existing user_jvm_args.txt from ConfigMap."

      if [[ ! -s "user_jvm_args.txt" ]]; then
        crashServer "ERROR! user_jvm_args.txt fehlt. Im ConfigMap-Modus muss diese Datei bereitgestellt werden."
      fi

      if [[ ${SEMANTICS[1]} -eq 20 ]] && [[ ${#SEMANTICS[@]} -eq 2 || ${SEMANTICS[2]} -eq 1 ]]; then
        SERVER_RUN_COMMAND="@user_jvm_args.txt -jar ${SERVERSTARTERJAR_PATH} --installer-force --installer https://maven.neoforged.net/releases/net/neoforged/forge/${MINECRAFT_VERSION}-${MODLOADER_VERSION}/forge-${MINECRAFT_VERSION}-${MODLOADER_VERSION}-installer.jar nogui"
      else
        SERVER_RUN_COMMAND="@user_jvm_args.txt -jar ${SERVERSTARTERJAR_PATH} --installer-force --installer ${MODLOADER_VERSION} nogui"
      fi

      refreshServerJar
    }

    setupFabric() {
      echo ""
      echo "Running Fabric checks and setup..."

      FABRIC_INSTALLER_URL="https://maven.fabricmc.net/net/fabricmc/fabric-installer/${FABRIC_INSTALLER_VERSION}/fabric-installer-${FABRIC_INSTALLER_VERSION}.jar"
      FABRIC_CHECK_URL="https://meta.fabricmc.net/v2/versions/loader/${MINECRAFT_VERSION}/${MODLOADER_VERSION}/server/json"
      IMPROVED_FABRIC_LAUNCHER_URL="https://meta.fabricmc.net/v2/versions/loader/${MINECRAFT_VERSION}/${MODLOADER_VERSION}/${FABRIC_INSTALLER_VERSION}/server/jar"

      if commandAvailable curl; then
        FABRIC_AVAILABLE="$(curl -LI "${FABRIC_CHECK_URL}" -o /dev/null -w '%{http_code}\n' -s)"
        IMPROVED_FABRIC_LAUNCHER_AVAILABLE="$(curl -LI "${IMPROVED_FABRIC_LAUNCHER_URL}" -o /dev/null -w '%{http_code}\n' -s)"
      elif commandAvailable wget; then
        FABRIC_AVAILABLE="$(wget --server-response "${FABRIC_CHECK_URL}" 2>&1 | awk '/^  HTTP/{print $2}' | tail -n1)"
        IMPROVED_FABRIC_LAUNCHER_AVAILABLE="$(wget --server-response "${IMPROVED_FABRIC_LAUNCHER_URL}" 2>&1 | awk '/^  HTTP/{print $2}' | tail -n1)"
      else
        crashServer "Neither curl nor wget available."
      fi

      if [[ "${IMPROVED_FABRIC_LAUNCHER_AVAILABLE}" == "200" ]]; then
        echo "Improved Fabric Server Launcher available..."
        echo "The improved launcher will be used to run this Fabric server."
        LAUNCHER_JAR_LOCATION="fabric-server-launcher.jar"
        downloadIfNotExist "fabric-server-launcher.jar" "fabric-server-launcher.jar" "${IMPROVED_FABRIC_LAUNCHER_URL}" >/dev/null || \
          crashServer "Failed to download improved Fabric launcher."
      elif [[ "${FABRIC_AVAILABLE}" != "200" ]]; then
        crashServer "Fabric is not available for Minecraft ${MINECRAFT_VERSION}, Fabric ${MODLOADER_VERSION}."
      elif [[ $(downloadIfNotExist "fabric-server-launch.jar" "fabric-installer.jar" "${FABRIC_INSTALLER_URL}") == "true" ]]; then
        echo "Installer downloaded..."
        LAUNCHER_JAR_LOCATION="fabric-server-launch.jar"
        runJavaCommand "-jar fabric-installer.jar server -mcversion ${MINECRAFT_VERSION} -loader ${MODLOADER_VERSION} -downloadMinecraft"

        if [[ -s "fabric-server-launch.jar" ]]; then
          rm -rf .fabric-installer
          rm -f fabric-installer.jar
          echo "Installation complete. fabric-installer.jar deleted."
        else
          rm -f fabric-installer.jar
          crashServer "fabric-server-launch.jar not found. Maybe the Fabric servers are having trouble. Please try again in a couple of minutes and check your internet connection."
        fi
      else
        echo "fabric-server-launch.jar present. Moving on..."
        LAUNCHER_JAR_LOCATION="fabric-server-launch.jar"
      fi

      SERVER_RUN_COMMAND="${JAVA_ARGS} -jar ${LAUNCHER_JAR_LOCATION} nogui"
    }

    setupQuilt() {
      echo ""
      echo "Running Quilt checks and setup..."

      QUILT_INSTALLER_URL="https://maven.quiltmc.org/repository/release/org/quiltmc/quilt-installer/${QUILT_INSTALLER_VERSION}/quilt-installer-${QUILT_INSTALLER_VERSION}.jar"
      QUILT_CHECK_URL="https://meta.fabricmc.net/v2/versions/intermediary/${MINECRAFT_VERSION}"

      if commandAvailable curl; then
        QUILT_AVAILABLE="$(curl -LI "${QUILT_CHECK_URL}" -o /dev/null -w '%{http_code}\n' -s)"
      elif commandAvailable wget; then
        QUILT_AVAILABLE="$(wget --server-response "${QUILT_CHECK_URL}" 2>&1 | awk '/^  HTTP/{print $2}' | tail -n1)"
      else
        crashServer "Neither curl nor wget available."
      fi

      if [[ "${#QUILT_AVAILABLE}" -eq 2 ]] && [[ "${QUILT_AVAILABLE}" != "200" ]]; then
        crashServer "Quilt is not available for Minecraft ${MINECRAFT_VERSION}, Quilt ${MODLOADER_VERSION}."
      elif [[ $(downloadIfNotExist "quilt-server-launch.jar" "quilt-installer.jar" "${QUILT_INSTALLER_URL}") == "true" ]]; then
        echo "Installer downloaded. Installing..."
        runJavaCommand "-jar quilt-installer.jar install server ${MINECRAFT_VERSION} --download-server --install-dir=."

        if [[ -s "quilt-server-launch.jar" ]]; then
          rm -f quilt-installer.jar
          echo "Installation complete. quilt-installer.jar deleted."
        else
          rm -f quilt-installer.jar
          crashServer "quilt-server-launch.jar not found. Maybe the Quilt servers are having trouble. Please try again in a couple of minutes and check your internet connection."
        fi
      fi

      LAUNCHER_JAR_LOCATION="quilt-server-launch.jar"
      SERVER_RUN_COMMAND="${JAVA_ARGS} -jar ${LAUNCHER_JAR_LOCATION} nogui"
    }

    setupLegacyFabric() {
      echo ""
      echo "Running LegacyFabric checks and setup..."

      LEGACYFABRIC_INSTALLER_URL="https://maven.legacyfabric.net/net/legacyfabric/fabric-installer/${LEGACYFABRIC_INSTALLER_VERSION}/fabric-installer-${LEGACYFABRIC_INSTALLER_VERSION}.jar"
      LEGACYFABRIC_CHECK_URL="https://meta.legacyfabric.net/v2/versions/loader/${MINECRAFT_VERSION}"

      if commandAvailable curl; then
        LEGACYFABRIC_AVAILABLE="$(curl -LI "${LEGACYFABRIC_CHECK_URL}" -o /dev/null -w '%{http_code}\n' -s)"
      elif commandAvailable wget; then
        LEGACYFABRIC_AVAILABLE="$(wget --server-response "${LEGACYFABRIC_CHECK_URL}" 2>&1 | awk '/^  HTTP/{print $2}' | tail -n1)"
      else
        crashServer "Neither curl nor wget available."
      fi

      if [[ "${#LEGACYFABRIC_AVAILABLE}" -eq 2 ]] && [[ "${LEGACYFABRIC_AVAILABLE}" != "200" ]]; then
        crashServer "LegacyFabric is not available for Minecraft ${MINECRAFT_VERSION}, LegacyFabric ${MODLOADER_VERSION}."
      elif [[ $(downloadIfNotExist "fabric-server-launch.jar" "legacyfabric-installer.jar" "${LEGACYFABRIC_INSTALLER_URL}") == "true" ]]; then
        echo "Installer downloaded. Installing..."
        runJavaCommand "-jar legacyfabric-installer.jar server -mcversion ${MINECRAFT_VERSION} -loader ${MODLOADER_VERSION} -downloadMinecraft"

        if [[ -s "fabric-server-launch.jar" ]]; then
          rm -f legacyfabric-installer.jar
          echo "Installation complete. legacyfabric-installer.jar deleted."
        else
          rm -f legacyfabric-installer.jar
          crashServer "fabric-server-launch.jar not found. Maybe the LegacyFabric servers are having trouble. Please try again in a couple of minutes and check your internet connection."
        fi
      fi

      LAUNCHER_JAR_LOCATION="fabric-server-launch.jar"
      SERVER_RUN_COMMAND="${JAVA_ARGS} -jar ${LAUNCHER_JAR_LOCATION} nogui"
    }

    echo "Start script generated by ServerPackCreator 7.2.7."
    echo "To change the launch settings of this server, such as JVM args / flags, Minecraft version, modloader version etc., edit the variables.txt-file."

    WORK_DIR="/data"

    mkdir -p "${WORK_DIR}" || true
    if [[ ! -w "${WORK_DIR}" ]]; then
      crashServer "ERROR! ${WORK_DIR} ist nicht beschreibbar."
    fi

    cd "${WORK_DIR}" || crashServer "ERROR! Konnte nicht nach ${WORK_DIR} wechseln."
    SERVERSTARTERJAR_PATH="${WORK_DIR}/server.jar"

    if [[ "${WORK_DIR}" == *" "* ]]; then
      echo "WARNING! The current location of this script contains spaces. This may cause this server to crash!"
    fi

    if [[ "$(id -u)" == "0" ]]; then
      echo "Warning! Running with administrator-privileges is not recommended."
    fi

    if [[ ! -s "variables.txt" ]]; then
      crashServer "ERROR! variables.txt not present. Without it the server can not be installed, configured or started."
    fi

    source "./variables.txt"

    LAUNCHER_JAR_LOCATION="do_not_manually_edit"
    SERVER_RUN_COMMAND="do_not_manually_edit"
    JAVA_VERSION="do_not_manually_edit"
    IFS="." read -ra SEMANTICS <<< "${MINECRAFT_VERSION}"

    if [[ "${SKIP_JAVA_CHECK}" == "true" ]]; then
      echo "Skipping Java version checks."
      if commandAvailable "${JAVA:-java}"; then
        JAVA="${JAVA:-java}"
        getJavaVersion || true
      fi
    else
      if [[ "${JAVA}" == "java" ]]; then
        if ! commandAvailable "$JAVA"; then
          installJava
        else
          getJavaVersion
          if [[ "${JAVA_VERSION:-}" =~ ^[0-9]+$ ]]; then
            if [[ "${JAVA_VERSION}" != "${RECOMMENDED_JAVA_VERSION}" ]]; then
              installJava
            fi
          else
            installJava
          fi
        fi
      else
        getJavaVersion
        echo "Detected ${SEMANTICS[0]}.${SEMANTICS[1]}.${SEMANTICS[2]:-0} - Java ${JAVA_VERSION}"
        if [[ "${JAVA_VERSION}" != "${RECOMMENDED_JAVA_VERSION}" ]]; then
          JAVA="java"
          installJava
        fi
      fi
    fi

    "${JAVA}" "-version" 2>&1 | grep -i "32-Bit" && echo "WARNING! 32-Bit Java detected! It is highly recommended to use a 64-Bit version of Java!"

    case "${MODLOADER}" in
      "Forge")
        setupForge
        ;;
      "NeoForge")
        setupNeoForge
        ;;
      "Fabric")
        setupFabric
        ;;
      "Quilt")
        setupQuilt
        ;;
      "LegacyFabric")
        setupLegacyFabric
        ;;
      *)
        crashServer "Incorrect modloader specified: ${MODLOADER}"
        ;;
    esac

    if [[ ! -s "eula.txt" ]]; then
      if [[ "${EULA:-}" == "TRUE" || "${EULA:-}" == "true" ]]; then
        echo "[init] EULA accepted via ENV, but eula.txt fehlt."
        echo "[init] Bitte eula.txt im Image oder per ConfigMap bereitstellen."
      else
        crashServer "EULA not accepted. Set environment variable EULA=true und stelle eula.txt bereit."
      fi
    fi

    stage_backup_mod
    place_backup_mod
    configure_rcon_server_properties

    send_rcon_commands &

    echo ""
    echo "Starting server..."
    echo "Work directory:                 $(pwd)"
    echo "Minecraft version:              ${MINECRAFT_VERSION}"
    echo "Modloader:                      ${MODLOADER}"
    echo "Modloader version:              ${MODLOADER_VERSION}"
    echo "LegacyFabric Installer Version: ${LEGACYFABRIC_INSTALLER_VERSION:-}"
    echo "Fabric Installer Version:       ${FABRIC_INSTALLER_VERSION:-}"
    echo "Quilt Installer Version:        ${QUILT_INSTALLER_VERSION:-}"
    echo "Java Args:                      ${JAVA_ARGS:-}"
    echo "Additional Args:                ${ADDITIONAL_ARGS:-}"
    echo "Java Path:                      ${JAVA}"
    echo "Wait For User Input:            ${WAIT_FOR_USER_INPUT:-false}"
    echo "ServerStarterJar Path:          ${SERVERSTARTERJAR_PATH}"
    if [[ "${LAUNCHER_JAR_LOCATION}" != "do_not_manually_edit" ]]; then
      echo "Launcher JAR:                   ${LAUNCHER_JAR_LOCATION}"
    fi
    echo "Mods count:                     $(find mods -maxdepth 1 -type f -name '*.jar' 2>/dev/null | wc -l | tr -d ' ')"
    echo "Run Command:                    ${JAVA} ${ADDITIONAL_ARGS:-} ${SERVER_RUN_COMMAND}"
    echo "Java version:"
    "${JAVA}" -version
    echo ""

    if [[ "${SERVER_RUN_COMMAND}" == *"server.jar"* ]] && [[ ! -s "${SERVERSTARTERJAR_PATH}" ]]; then
      crashServer "ERROR! Start abgebrochen: ${SERVERSTARTERJAR_PATH} fehlt, obwohl sie im SERVER_RUN_COMMAND verwendet wird."
    fi

    while true; do
      runJavaCommand "${ADDITIONAL_ARGS:-} ${SERVER_RUN_COMMAND}"

      if [[ "${SKIP_JAVA_CHECK}" == "true" ]]; then
        echo "Java version check was skipped. Did the server stop or crash because of a Java version mismatch?"
        echo "Detected ${SEMANTICS[0]}.${SEMANTICS[1]}.${SEMANTICS[2]:-0} - Java ${JAVA_VERSION}, recommended ${RECOMMENDED_JAVA_VERSION}."
      fi

      if [[ "${RESTART}" != "true" ]]; then
        echo "Exiting..."
        if [[ "${WAIT_FOR_USER_INPUT:-false}" == "true" ]]; then
          pause
        fi
        exit 0
      fi

      echo "Automatically restarting server in 5 seconds. Press CTRL + C to abort and exit."
      sleep 5
    done