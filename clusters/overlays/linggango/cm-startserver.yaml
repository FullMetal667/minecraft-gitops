kind: ConfigMap
apiVersion: v1
metadata:
  name: startserver
data:
  startserver.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    IMAGE_APP_DIR="${APP_DIR:-/opt/linggango}"   # hier liegt das ZIP im Image
    DATA_DIR="${DATA_DIR:-/data}"

    ZIP="${ZIP:-}"                               # z.B. serverpackv6.42.zip
    LINGGANGO_FORCE_REINIT="${LINGGANGO_FORCE_REINIT:-false}"

    # Marker für einmalige Initialisierung (an ZIP gekoppelt => wenn ZIP-Name ändert, wird neu initialisiert)
    LINGGANGO_INIT_MARKER="${DATA_DIR}/.linggango_initialized_${ZIP:-local}"

    # ---- LINGGANGO / NeoForge Version ----
    NEOFORGE_VERSION="${NEOFORGE_VERSION:-21.1.214}"
    INSTALLER="neoforge-${NEOFORGE_VERSION}-installer.jar"
    NEOFORGE_URL="https://maven.neoforged.net/releases/net/neoforged/neoforge/${NEOFORGE_VERSION}/neoforge-${NEOFORGE_VERSION}-installer.jar"

    # ---- SimpleBackups (über overlays) ----
    BACKUP_MOD="${BACKUP_MOD:-advanced}"

    AB_FILE_ID="${AB_FILE_ID:-7173771}"
    AB_FILE_NAME="${AB_FILE_NAME:-SimpleBackups-1.21-4.0.23.jar}"
    AB_DIR1=$(( AB_FILE_ID / 1000 ))
    AB_DIR2=$(( AB_FILE_ID % 1000 ))
    ADVANCED_BACKUPS_URL="${ADVANCED_BACKUPS_URL:-https://mediafilez.forgecdn.net/files/${AB_DIR1}/${AB_DIR2}/${AB_FILE_NAME}}"

    selected_backup_filename() {
      case "${BACKUP_MOD}" in
        advanced) echo "${AB_FILE_NAME}" ;;
        none|"")  echo "" ;;
      esac
    }

    selected_backup_url() {
      case "${BACKUP_MOD}" in
        advanced) echo "${ADVANCED_BACKUPS_URL}" ;;
        none|"")  echo "" ;;
      esac
    }

    stage_backup_mod() {
      local fname url
      fname="$(selected_backup_filename)"
      url="$(selected_backup_url)"
      [[ -n "${fname}" ]] || return 0

      mkdir -p "${DATA_DIR}/overlays/mods"

      if [[ -f "${DATA_DIR}/overlays/mods/${fname}" ]]; then
        return 0
      fi

      if [[ -f "${DATA_DIR}/${fname}" ]]; then
        cp -n "${DATA_DIR}/${fname}" "${DATA_DIR}/overlays/mods/${fname}" 2>/dev/null || true
        return 0
      fi

      if [[ -n "${url}" ]]; then
        echo "[BK] downloading ${fname} from ${url}"
        if ! curl -fsSL "${url}" -o "${DATA_DIR}/overlays/mods/${fname}"; then
          echo "[BK] WARN: download failed for ${fname} (continuing without backup mod)"
          rm -f "${DATA_DIR}/overlays/mods/${fname}" || true
        fi
      fi
    }

    place_backup_mod() {
      local fname src
      fname="$(selected_backup_filename)"
      [[ -n "${fname}" ]] || return 0

      mkdir -p "${DATA_DIR}/mods"

      if [[ -f "${DATA_DIR}/overlays/mods/${fname}" ]]; then
        src="${DATA_DIR}/overlays/mods/${fname}"
      else
        return 0
      fi

      if [[ -f "${DATA_DIR}/mods/${fname}" ]]; then
        echo "[BK] ${fname} bereits in mods/ vorhanden – nichts überschrieben."
        return 0
      fi

      cp -n "${src}" "${DATA_DIR}/mods/${fname}" 2>/dev/null || true
    }

    # ---- RCON ----
    RCON_ENABLE="${RCON_ENABLE:-true}"
    RCON_HOST="${RCON_HOST:-127.0.0.1}"
    RCON_PORT="${RCON_PORT:-25575}"
    RCON_PASSWORD="${RCON_PASSWORD:-mc321}"
    RCON_WAIT_SECS="${RCON_WAIT_SECS:-1800}"
    RCON_POLL_INTERVAL="${RCON_POLL_INTERVAL:-5}"

    # ---- nc / ncat detection ----
    NC_BIN="${NC_BIN:-nc}"
    if ! command -v "${NC_BIN}" >/dev/null 2>&1; then
      if command -v ncat >/dev/null 2>&1; then
        NC_BIN="ncat"
      fi
    fi

    mkdir -p "${DATA_DIR}"
    cd "${DATA_DIR}"

    need() { command -v "$1" >/dev/null 2>&1 || { echo "[ERR] missing $1"; exit 1; }; }

    ensure_unzip() {
      if command -v unzip >/dev/null 2>&1; then return 0; fi
      echo "[TOOLS] unzip missing"
      if command -v microdnf >/dev/null 2>&1; then
        echo "[TOOLS] installing unzip via microdnf"
        microdnf -y install unzip && microdnf clean all
        return 0
      fi
      echo "[ERR] unzip missing and microdnf not available"
      exit 1
    }

    # ============================================================
    # 0) Initialisierung nach /data:
    #    - kein Download mehr!
    #    - ZIP liegt im Image unter ${IMAGE_APP_DIR}/${ZIP}
    #    - wird nach /data verschoben/kopiert und entpackt
    # ============================================================
    if [[ "${LINGGANGO_FORCE_REINIT}" == "true" ]]; then
      echo "[LINGGANGO] FORCE_REINIT enabled -> removing init marker"
      rm -f "${LINGGANGO_INIT_MARKER}" 2>/dev/null || true
    fi

    if [[ ! -f "${LINGGANGO_INIT_MARKER}" ]]; then
      echo "[LINGGANGO] First init: preparing /data ..."

      ensure_unzip
      need curl

      if [[ -z "${ZIP}" ]]; then
        echo "[ERR] ZIP not set (e.g. ZIP=serverpackv6.42.zip)"
        exit 1
      fi

      IMAGE_ZIP_PATH="${IMAGE_APP_DIR}/${ZIP}"
      ZIP_PATH="${DATA_DIR}/${ZIP}"

      if [[ ! -f "${ZIP_PATH}" ]]; then
        if [[ ! -f "${IMAGE_ZIP_PATH}" ]]; then
          echo "[ERR] serverpack zip not found in image: ${IMAGE_ZIP_PATH}"
          echo "[DBG] Listing ${IMAGE_APP_DIR}:"
          ls -la "${IMAGE_APP_DIR}" 2>/dev/null || true
          exit 1
        fi

        echo "[LINGGANGO] Moving serverpack zip ${IMAGE_ZIP_PATH} -> ${ZIP_PATH}"
        # mv kann bei read-only layer fehlschlagen -> dann copy
        if ! mv -f "${IMAGE_ZIP_PATH}" "${ZIP_PATH}" 2>/dev/null; then
          echo "[LINGGANGO] mv failed (likely read-only image layer) -> copying instead"
          cp -f "${IMAGE_ZIP_PATH}" "${ZIP_PATH}"
        fi
      else
        echo "[LINGGANGO] Zip already present in data: ${ZIP_PATH}"
      fi

      # ZIP validieren
      if ! unzip -tq "${ZIP_PATH}" >/dev/null 2>&1; then
        echo "[ERR] serverpack zip invalid/corrupt: ${ZIP_PATH}"
        echo "[DBG] Size: $(wc -c < "${ZIP_PATH}" | tr -d ' ') bytes"
        exit 1
      fi

      TMP_UNPACK="${DATA_DIR}/.serverpack_unpack"
      rm -rf "${TMP_UNPACK}" 2>/dev/null || true
      mkdir -p "${TMP_UNPACK}"

      echo "[LINGGANGO] Unzipping serverpack -> ${TMP_UNPACK}"
      unzip -q "${ZIP_PATH}" -d "${TMP_UNPACK}"

      root_count="$(find "${TMP_UNPACK}" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d " ")"
      file_count="$(find "${TMP_UNPACK}" -mindepth 1 -maxdepth 1 -type f | wc -l | tr -d " ")"

      SRC="${TMP_UNPACK}"
      if [[ "${root_count}" == "1" && "${file_count}" == "0" ]]; then
        SRC="$(find "${TMP_UNPACK}" -mindepth 1 -maxdepth 1 -type d | head -n1)"
      fi

      echo "[LINGGANGO] Copying serverpack contents into ${DATA_DIR} (no overwrite)"
      shopt -s dotglob
      cp -an "${SRC}/"* "${DATA_DIR}/" 2>/dev/null || true
      shopt -u dotglob

      rm -rf "${TMP_UNPACK}" 2>/dev/null || true
      touch "${LINGGANGO_INIT_MARKER}"
    fi

    # =======================
    # EULA
    # =======================
    if [ ! -f eula.txt ] || ! grep -q 'eula=true' eula.txt; then
      if [ "${EULA:-}" = "TRUE" ] || [ "${EULA:-}" = "true" ]; then
        {
          echo "# By changing the setting below to TRUE you are indicating your agreement to the EULA (https://aka.ms/MinecraftEULA)."
          echo "# $(date -u)"
          echo "eula=true"
        } > eula.txt
        echo "[init] EULA accepted via ENV"
      else
        echo "[init] EULA not accepted. Setze ENV EULA=true oder lege /data/eula.txt mit 'eula=true' an."
        exit 3
      fi
    fi

    # =======================
    # LINGGANGO / NeoForge – Installation
    # =======================
    if ! command -v "${LINGGANGO_JAVA:-java}" >/dev/null 2>&1; then
      echo "[LINGGANGO] Minecraft 1.21 requires Java 21 - Java not found (LINGGANGO_JAVA oder java)"
      exit 1
    fi

    UNIX_ARGS="libraries/net/neoforged/neoforge/${NEOFORGE_VERSION}/unix_args.txt"

    if [[ ! -f "${UNIX_ARGS}" ]]; then
      echo "[LINGGANGO] Neoforge not installed (missing ${UNIX_ARGS}), installing now."

      if [[ ! -f "${INSTALLER}" ]]; then
        echo "[LINGGANGO] No Neoforge installer found, downloading now: ${NEOFORGE_URL}"
        if command -v wget >/dev/null 2>&1; then
          wget -O "${INSTALLER}" "${NEOFORGE_URL}"
        elif command -v curl >/dev/null 2>&1; then
          curl -fL -o "${INSTALLER}" "${NEOFORGE_URL}"
        else
          echo "[LINGGANGO] Neither wget nor curl were found in the container. Please add one and try again."
          exit 1
        fi
      fi

      echo "[LINGGANGO] Running Neoforge installer."
      "${LINGGANGO_JAVA:-java}" -jar "${INSTALLER}" -installServer

      if [[ ! -f "${UNIX_ARGS}" ]]; then
        echo "[LINGGANGO] ERROR: Neoforge install finished but unix_args still missing: ${UNIX_ARGS}"
        echo "[LINGGANGO] DEBUG: listing expected dir:"
        ls -la "libraries/net/neoforged/neoforge/${NEOFORGE_VERSION}" 2>/dev/null || true
        exit 1
      fi
    else
      echo "[LINGGANGO] Neoforge already installed: ${UNIX_ARGS}"
    fi

    if [[ ! -e server.properties ]]; then
      cat > server.properties <<EOF
    allow-flight=true
    motd=Linggango
    max-tick-time=180000
    EOF
    fi

    if [[ "${LINGGANGO_INSTALL_ONLY:-false}" == "true" ]]; then
      echo "[LINGGANGO] INSTALL_ONLY: complete"
      exit 0
    fi

    JAVA_VERSION="$("${LINGGANGO_JAVA:-java}" -fullversion 2>&1 | awk -F '\"' '/version/ {print $2}' | cut -d'.' -f1 || echo 0)"
    if ! [[ "${JAVA_VERSION}" =~ ^[0-9]+$ ]] || [[ "${JAVA_VERSION}" -lt 21 ]]; then
      echo "[LINGGANGO] Minecraft 1.21 requires Java 21 - found Java ${JAVA_VERSION}"
      exit 1
    fi

    # =======================
    # SimpleBackups einmalig bereitstellen
    # =======================
    stage_backup_mod || true
    place_backup_mod || true

    # =======================
    # Disable known incompatible loader/bridge mods on NeoForge servers
    # =======================
    MODS_DIR="${DATA_DIR}/mods"
    DISABLED_DIR="${DATA_DIR}/mods.disabled"
    mkdir -p "${DISABLED_DIR}"

    disable_glob_recursive() {
      local glob="$1"
      shopt -s globstar nullglob
      for f in "${MODS_DIR}"/**/${glob}; do
        [[ -f "$f" ]] || continue
        echo "[MODS] disabling $(basename "$f") -> ${DISABLED_DIR}"
        mv -f "$f" "${DISABLED_DIR}/" || true
      done
      shopt -u globstar nullglob
    }

    disable_if_contains() {
      local needle="$1"
      shopt -s globstar nullglob
      for f in "${MODS_DIR}"/**/*.jar; do
        [[ -f "$f" ]] || continue
        # ServiceLoader Einträge / Klassen-Strings finden (kein unzip nötig)
        if strings "$f" 2>/dev/null | grep -q "${needle}"; then
          echo "[MODS] disabling by content '${needle}': $(basename "$f") -> ${DISABLED_DIR}"
          mv -f "$f" "${DISABLED_DIR}/" || true
        fi
      done
      shopt -u globstar nullglob
    }

    # 1) Name-basierte Deaktivierung (rekursiv)
    disable_glob_recursive "*sinytra*"
    disable_glob_recursive "*connector*"
    disable_glob_recursive "*forgifiedfabric*"
    disable_glob_recursive "*forgified-fabric*"
    disable_glob_recursive "*fabric-api*"
    disable_glob_recursive "*fabric*api*"
    disable_glob_recursive "*crashassistant*"
    disable_glob_recursive "*CrashAssistant*"

    # 2) Inhalt-basierte Deaktivierung (findet auch umbenannte JARs)
    disable_if_contains "org/sinytra/connector/service/ConnectorLoaderService"
    disable_if_contains "CrashAssistantTransformationService"
    disable_if_contains "net/minecraftforge/fml/loading/ImmediateWindowProvider"

    echo "[MODS] remaining jars:"
    find "${MODS_DIR}" -type f -name "*.jar" -maxdepth 2 -print | sed 's#^#[MODS] #'

    # =======================
    # Hauptloop: Server starten + RCON-Commands
    # =======================
    while true; do
      echo "[LINGGANGO] starting server ..."
      "${LINGGANGO_JAVA:-java}" @user_jvm_args.txt @"${UNIX_ARGS}" nogui &
      SERVER_PID=$!

      if [[ "${RCON_ENABLE}" == "true" && -s "${DATA_DIR}/commands.txt" ]]; then
        echo "[RCON] waiting for ${RCON_HOST}:${RCON_PORT} (timeout ${RCON_WAIT_SECS}s) ..."
        waited=0
        until command -v "${NC_BIN}" >/dev/null 2>&1 && ${NC_BIN} -z "${RCON_HOST}" "${RCON_PORT}" 2>/dev/null; do
          sleep "${RCON_POLL_INTERVAL}"
          waited=$(( waited + RCON_POLL_INTERVAL ))
          if [[ "${waited}" -ge "${RCON_WAIT_SECS}" ]]; then
            echo "[RCON] timeout (${RCON_WAIT_SECS}s) – skip commands"
            break
          fi
        done

        if command -v "${NC_BIN}" >/dev/null 2>&1 && ${NC_BIN} -z "${RCON_HOST}" "${RCON_PORT}" 2>/dev/null; then
          sleep 3
          echo "[RCON] sending commands from commands.txt"
          sed -e 's#^/##' -e '/^\s*#/d' -e '/^\s*$/d' "${DATA_DIR}/commands.txt" | \
            /usr/local/bin/mcrcon -H "${RCON_HOST}" -P "${RCON_PORT}" -p "${RCON_PASSWORD}" -s || true
        fi
      fi

      wait "${SERVER_PID}" || true

      if [[ "${LINGGANGO_RESTART:-true}" == "false" ]]; then
        echo "[LINGGANGO] server stopped, automatic restart disabled (LINGGANGO_RESTART=false)"
        exit 0
      fi

      echo "[LINGGANGO] Restarting automatically in 10 seconds (Ctrl+C to stop container)"
      sleep 10
    done
