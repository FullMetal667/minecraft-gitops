apiVersion: v1
kind: ConfigMap
metadata:
  name: startserver
data:
  startserver.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    log() { echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] $*"; }
    need() { command -v "$1" >/dev/null 2>&1 || { log "ERROR: missing $1"; exit 1; }; }

    # ------------------------------------------------------------
    # Defaults / Env
    # ------------------------------------------------------------
    DATA_DIR="${DATA_DIR:-/data}"
    APP_DIR="${APP_DIR:-${DATA_DIR}/forge}"          # writable forge/server home on PVC
    IMAGE_MC_HOME="${IMAGE_MC_HOME:-/srv/mc}"        # immutable image content (eula seed)

    MC_VERSION="${MC_VERSION:-1.20.1}"
    FORGE_VERSION="${FORGE_VERSION:-47.4.0}"

    CF_API_KEY="${CF_API_KEY:-}"

    MODPACK_ZIP_URL="${MODPACK_ZIP_URL:-}"
    MODPACK_ZIP_PATH="${MODPACK_ZIP_PATH:-}"         # optional local path

    FILE_ID="${FILE_ID:-}"
    ZIP="${ZIP:-}"                                   # e.g. linggango-v6.4.zip
    ZIP_NAME="${ZIP_NAME:-}"                         # optional
    MOD_NAME="${MOD_NAME:-}"
    IMAGE_TAG="${IMAGE_TAG:-}"

    # Layout
    MODS_DIR="${APP_DIR}/mods"
    DISABLED_DIR="${APP_DIR}/mods.disabled"
    MODPACK_DIR="${APP_DIR}/modpack"                 # keep zip away from mods filter
    MODPACK_ZIP="${MODPACK_DIR}/Linggango.zip"

    UNPACK_DIR="${DATA_DIR}/.modpack"
    MANIFEST_PATH="${UNPACK_DIR}/manifest.json"
    OVERRIDES_DIR="${UNPACK_DIR}/overrides"

    DISABLE_CREATE_ADDONS="${DISABLE_CREATE_ADDONS:-true}"

    mkdir -p "${DATA_DIR}" "${APP_DIR}" "${MODS_DIR}" "${DISABLED_DIR}" "${MODPACK_DIR}"
    log "Using APP_DIR=${APP_DIR} DATA_DIR=${DATA_DIR}"

    need java
    need curl
    need python3

    # unzip is optional: we can install it if missing (UBI image -> microdnf)
    ensure_unzip() {
      if command -v unzip >/dev/null 2>&1; then return 0; fi
      log "TOOLS: unzip missing -> installing"
      if command -v microdnf >/dev/null 2>&1; then
        microdnf -y install unzip && microdnf clean all
      else
        log "ERROR: unzip missing and microdnf not available"
        exit 1
      fi
    }
    ensure_unzip
    need unzip

    # ------------------------------------------------------------
    # Ensure EULA exists in APP_DIR
    # ------------------------------------------------------------
    ensure_eula() {
      if [[ -f "${APP_DIR}/eula.txt" ]] && grep -q 'eula=true' "${APP_DIR}/eula.txt"; then
        return 0
      fi
      if [[ -f "${IMAGE_MC_HOME}/eula.txt" ]] && grep -q 'eula=true' "${IMAGE_MC_HOME}/eula.txt"; then
        log "EULA: seeding accepted eula.txt from ${IMAGE_MC_HOME} -> ${APP_DIR}"
        cp -f "${IMAGE_MC_HOME}/eula.txt" "${APP_DIR}/eula.txt"
        return 0
      fi
      log "ERROR: eula.txt missing or not accepted in ${APP_DIR} (and no accepted seed found in ${IMAGE_MC_HOME})"
      exit 3
    }

    # ------------------------------------------------------------
    # Install Forge (idempotent) into APP_DIR
    # ------------------------------------------------------------
    FORGE_MARKER="${APP_DIR}/.forge_${MC_VERSION}_${FORGE_VERSION}_installed"

    install_forge_if_needed() {
      if [[ -f "${FORGE_MARKER}" ]]; then
        log "FORGE: already installed (${MC_VERSION}-${FORGE_VERSION}) in ${APP_DIR}"
        return 0
      fi

      log "FORGE: installing ${MC_VERSION}-${FORGE_VERSION} into ${APP_DIR}"
      curl -fL --retry 3 --retry-delay 2 -o /tmp/forge-installer.jar \
        "https://maven.minecraftforge.net/net/minecraftforge/forge/${MC_VERSION}-${FORGE_VERSION}/forge-${MC_VERSION}-${FORGE_VERSION}-installer.jar"

      ( cd "${APP_DIR}" && java -jar /tmp/forge-installer.jar --installServer ) 2>&1 | sed -u 's/^/[FORGE-INSTALL] /'
      rc=${PIPESTATUS[0]}
      rm -f /tmp/forge-installer.jar || true
      [[ "${rc}" -eq 0 ]] || { log "FORGE: installer failed rc=${rc}"; exit "${rc}"; }

      touch "${FORGE_MARKER}"
      log "FORGE: install finished"
    }

    find_forge_unix_args() {
      local base="${APP_DIR}/libraries/net/minecraftforge/forge"
      find "${base}" -maxdepth 4 -type f -name unix_args.txt 2>/dev/null | head -n 1 || true
    }

    # ------------------------------------------------------------
    # Acquire Modpack ZIP -> normalize to ${MODPACK_ZIP}
    # ------------------------------------------------------------
    acquire_zip() {
      # already exists
      if [[ -f "${MODPACK_ZIP}" ]]; then
        log "MODPACK: using existing ${MODPACK_ZIP}"
        return 0
      fi

      # explicit URL
      if [[ -n "${MODPACK_ZIP_URL}" ]]; then
        log "MODPACK: downloading from MODPACK_ZIP_URL -> ${MODPACK_ZIP}"
        curl -fL --retry 3 --retry-delay 2 -o "${MODPACK_ZIP}.new" "${MODPACK_ZIP_URL}"
        mv -f "${MODPACK_ZIP}.new" "${MODPACK_ZIP}"
        return 0
      fi

      # derive name
      local name=""
      if [[ -n "${ZIP}" ]]; then
        name="${ZIP}"
      elif [[ -n "${ZIP_NAME}" ]]; then
        name="${ZIP_NAME}"
      elif [[ -n "${MOD_NAME}" && -n "${IMAGE_TAG}" ]]; then
        name="${MOD_NAME}-${IMAGE_TAG}.zip"
      fi

      # derived ForgeCDN URL
      if [[ -n "${FILE_ID}" && -n "${name}" ]]; then
        local dir1 dir2 url
        dir1=$(( FILE_ID / 1000 ))
        dir2=$(( FILE_ID % 1000 ))
        url="https://mediafilez.forgecdn.net/files/${dir1}/${dir2}/${name}"

        log "MODPACK: downloading from derived URL -> ${MODPACK_ZIP}"
        log "MODPACK: url=${url}"
        curl -fL --retry 3 --retry-delay 2 \
          -A "Mozilla/5.0" \
          -H "Referer: https://www.curseforge.com/" \
          -H "Accept: */*" \
          -o "${MODPACK_ZIP}.new" "${url}"
        mv -f "${MODPACK_ZIP}.new" "${MODPACK_ZIP}"
        return 0
      fi

      # optional local path
      if [[ -n "${MODPACK_ZIP_PATH}" && -f "${MODPACK_ZIP_PATH}" ]]; then
        log "MODPACK: using zip from MODPACK_ZIP_PATH -> ${MODPACK_ZIP}"
        cp -f "${MODPACK_ZIP_PATH}" "${MODPACK_ZIP}"
        return 0
      fi

      log "ERROR: No modpack zip found. Provide MODPACK_ZIP_URL or FILE_ID+ZIP (or MOD_NAME+IMAGE_TAG) or MODPACK_ZIP_PATH."
      exit 1
    }

    # ------------------------------------------------------------
    # Unpack and initialize when zip changes
    # ------------------------------------------------------------
    zip_hash() { sha256sum "${MODPACK_ZIP}" | awk '{print $1}'; }

    init_modpack_if_needed() {
      local h marker
      h="$(zip_hash)"
      marker="${DATA_DIR}/.modpack_initialized_${h}"

      if [[ -f "${marker}" ]]; then
        log "MODPACK: already initialized for hash=${h}"
        return 0
      fi

      log "MODPACK: new zip detected (hash=${h}) -> initializing"
      rm -rf "${UNPACK_DIR}"
      mkdir -p "${UNPACK_DIR}"
      log "MODPACK: unzipping ${MODPACK_ZIP} -> ${UNPACK_DIR}"
      unzip -q "${MODPACK_ZIP}" -d "${UNPACK_DIR}"

      if [[ ! -f "${MANIFEST_PATH}" ]]; then
        log "ERROR: manifest.json not found after unzip: ${MANIFEST_PATH}"
        find "${UNPACK_DIR}" -maxdepth 3 -type f | head -n 80 || true
        exit 1
      fi

      # prepare for your existing downloader
      mkdir -p /work/modpack
      cp -f "${MANIFEST_PATH}" /work/modpack/manifest.json

      # clear jars BEFORE downloading
      log "MODS: clearing existing jars in ${MODS_DIR}"
      find "${MODS_DIR}" -maxdepth 1 -type f -name "*.jar" -delete || true

      # apply overrides first (config/scripts/etc), keep no-overwrite
      if [[ -d "${OVERRIDES_DIR}" ]]; then
        log "MODPACK: applying overrides/ -> ${APP_DIR} (no overwrite)"
        cp -an "${OVERRIDES_DIR}/." "${APP_DIR}/" 2>/dev/null || true
      else
        log "MODPACK: WARN no overrides/ directory found"
      fi

      mkdir -p "${MODS_DIR}"
      mkdir -p /srv/mc
      rm -rf /srv/mc/mods
      ln -s "${MODS_DIR}" /srv/mc/mods

      export APP_DIR MODS_DIR CF_API_KEY

      # download mods
      if [[ -z "${CF_API_KEY}" ]]; then
        log "ERROR: CF_API_KEY not set - cannot download mods from manifest."
        exit 1
      fi
      log "MODS: downloading from manifest (download_mods.py)"
      python3 /work/tools/download_mods.py

      # verify download produced jars
      cnt="$(find "${MODS_DIR}" -maxdepth 1 -type f -name "*.jar" | wc -l | tr -d " ")"
      log "MODS: jars after download: ${cnt}"
      if [[ "${cnt}" -lt 5 ]]; then
        log "ERROR: mod download produced too few jars"
        exit 1
      fi

      rm -f "${DATA_DIR}/.modpack_initialized_"* 2>/dev/null || true
      touch "${marker}"
    }

    mods_count() {
      find "${MODS_DIR}" -maxdepth 1 -type f -name "*.jar" 2>/dev/null | wc -l | tr -d " "
    }

    # ------------------------------------------------------------
    # Disable client-only or wrong artifacts on dedicated server
    # ------------------------------------------------------------
    disable_client_only_mods() {
      mkdir -p "${DISABLED_DIR}"

      shopt -s nullglob
      while IFS= read -r f; do
        [[ -f "$f" ]] || continue
        base="$(basename "$f")"
        lower="${base,,}"

        # --- Create isolation: keep only core Create on servers ---
        if [[ "${DISABLE_CREATE_ADDONS}" == "true" ]]; then
          if [[ "${lower}" == *create* ]] && [[ "${lower}" != create-*.jar ]]; then
            log "MODS: disabling Create addon (isolation mode): ${base}"
            mv -f "$f" "${DISABLED_DIR}/${base}" 2>/dev/null || true
            continue
          fi
        fi

        # move zips from mods dir (shouldn't happen, but safe)
        if [[ "${lower}" != *.jar ]]; then
          log "MODS: disabling non-jar in mods/: ${base}"
          mv -f "$f" "${DISABLED_DIR}/${base}" 2>/dev/null || true
          continue
        fi

        # known client-only / wrong-side artifacts on dedicated servers
        # (rendering, UI, HUD, recipe viewers, discord presence, fabric-only libs, particle/visual mods)
        if [[ "${lower}" == *entity_texture_features* ]] \
          || [[ "${lower}" == *entity_model_features* ]] \
          || [[ "${lower}" == *etf* ]] \
          || [[ "${lower}" == *emf* ]] \
          || [[ "${lower}" == *particle_core* ]] \
          || [[ "${lower}" == *particlecore* ]] \
          || [[ "${lower}" == *fzzy_config* ]] \
          || [[ "${lower}" == fabric-* ]] \
          || [[ "${lower}" == *fabric-api* ]] \
          || [[ "${lower}" == *dynamicfps* ]] \
          || [[ "${lower}" == *sodium* ]] \
          || [[ "${lower}" == *iris* ]] \
          || [[ "${lower}" == *oculus* ]] \
          || [[ "${lower}" == *embeddium* ]] \
          || [[ "${lower}" == *rubidium* ]] \
          || [[ "${lower}" == *shader* ]] \
          || [[ "${lower}" == *mousetweaks* ]] \
          || [[ "${lower}" == *controlling* ]] \
          || [[ "${lower}" == *configured* ]] \
          || [[ "${lower}" == *drippyloadingscreen* ]] \
          || [[ "${lower}" == *discordrichpresence* ]] \
          || [[ "${lower}" == *simplediscordrichpresence* ]] \
          || [[ "${lower}" == *sdrp* ]] \
          || [[ "${lower}" == *xaeroworldmap* ]] \
          || [[ "${lower}" == *xaeros*minimap* ]] \
          || [[ "${lower}" == *minimap* ]] \
          || [[ "${lower}" == *worldmap* ]] \
          || [[ "${lower}" == *xaeros_waystones_compability* ]] \
          || [[ "${lower}" == *waystones_compability* ]] \
          || [[ "${lower}" == *particular* ]] \
          || [[ "${lower}" == *toomanyrecipeviewers* ]] \
          || [[ "${lower}" == *jei* ]] \
          || [[ "${lower}" == *rei* ]] \
          || [[ "${lower}" == *w2w2* ]] \
          || [[ "${lower}" == *xaerominimap* ]] \
          || [[ "${lower}" == *xaeroworldmap* ]] \
          || [[ "${lower}" == *emi* ]]; then
          log "MODS: disabling client-only: ${base}"
          mv -f "$f" "${DISABLED_DIR}/${base}" 2>/dev/null || true
          continue
        fi
      done < <(find "${MODS_DIR}" -maxdepth 2 -type f 2>/dev/null)
      shopt -u nullglob
    }

    disable_by_modid() {
      local id="$1"
      find "${MODS_DIR}" -maxdepth 2 -type f -name "*.jar" -print0 \
      | while IFS= read -r -d '' j; do
          if unzip -p "$j" META-INF/mods.toml 2>/dev/null | grep -qE "modId\s*=\s*\"${id}\""; then
            log "MODS: disabling by modId=${id}: $(basename "$j")"
            mv -f "$j" "${DISABLED_DIR}/" 2>/dev/null || true
          fi
        done
    }

    # Call these:
    disable_by_modid "oculus"
    disable_by_modid "nolijium"
    disable_by_modid "mekalus"

    # ------------------------------------------------------------
    # Optional: run mcrcon commands
    # (runs in background after server start)
    # ------------------------------------------------------------
    run_mcrcon_commands_bg() {
      [[ "${RCON_ENABLED:-false}" == "true" ]] || return 0
      [[ -n "${RCON_PASSWORD:-}" ]] || { log "MCRCON: RCON_PASSWORD missing"; return 0; }
      [[ -f "/data/commands.txt" ]] || { log "MCRCON: no /data/commands.txt found"; return 0; }
      command -v mcrcon >/dev/null 2>&1 || { log "MCRCON: binary not present"; return 0; }

      (
        log "MCRCON: waiting for RCON..."
        for i in {1..60}; do
          if mcrcon -H "${RCON_HOST:-127.0.0.1}" -P "${RCON_PORT:-25575}" -p "${RCON_PASSWORD}" "list" >/dev/null 2>&1; then
            break
          fi
          sleep 2
        done

        log "MCRCON: executing /data/commands.txt"
        while IFS= read -r cmd; do
          [[ -z "${cmd}" || "${cmd}" =~ ^# ]] && continue
          log "MCRCON: > ${cmd}"
          mcrcon -H "${RCON_HOST:-127.0.0.1}" -P "${RCON_PORT:-25575}" -p "${RCON_PASSWORD}" "${cmd}" || true
        done < /data/commands.txt
      ) &
    }

    # ------------------------------------------------------------
    # Main
    # ------------------------------------------------------------
    ensure_eula
    install_forge_if_needed

    FORGE_UNIX_ARGS="$(find_forge_unix_args)"
    if [[ -z "${FORGE_UNIX_ARGS}" ]]; then
      log "ERROR: Forge unix_args not found under ${APP_DIR}/libraries/net/minecraftforge/forge/**/unix_args.txt"
      ls -la "${APP_DIR}/libraries/net/minecraftforge/forge" 2>/dev/null || true
      exit 1
    fi
    log "Forge unix_args: ${FORGE_UNIX_ARGS}"

    acquire_zip
    init_modpack_if_needed

    n="$(mods_count)"
    log "MODS: jars present: ${n}"
    if [[ "${n}" -lt 5 ]]; then
      log "ERROR: mod download did not produce enough jars."
      exit 1
    fi

    disable_client_only_mods

    # start
    cd "${APP_DIR}"
    JVM_ARGS_FILE="${JVM_ARGS_FILE:-${APP_DIR}/user_jvm_args.txt}"
    RESTART="${RESTART:-false}"

    while true; do
      log "SERVER: starting Forge"
      java @"${JVM_ARGS_FILE}" @"${FORGE_UNIX_ARGS}" nogui &
      pid=$!

      run_mcrcon_commands_bg

      wait "${pid}" || true

      if [[ "${RESTART}" != "true" ]]; then
        log "SERVER: stopped - restart disabled"
        exit 0
      fi

      log "SERVER: stopped - restarting in 10s"
      sleep 10
    done
