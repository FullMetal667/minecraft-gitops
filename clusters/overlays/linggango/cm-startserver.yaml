apiVersion: v1
kind: ConfigMap
metadata:
  name: startserver
data:
  startserver.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    log() { echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] $*"; }
    need() { command -v "$1" >/dev/null 2>&1 || { log "ERROR: missing $1"; exit 1; }; }

    # ------------------------------------------------------------
    # Defaults / Env (must be defined before any use because of -u)
    # ------------------------------------------------------------
    DATA_DIR="${DATA_DIR:-/data}"
    APP_DIR="${APP_DIR:-${DATA_DIR}/forge}"          # writeable forge/server home on PVC
    IMAGE_MC_HOME="${IMAGE_MC_HOME:-/srv/mc}"        # immutable image content (eula seed, optional zip seed)

    MODPACK_ZIP_URL="${MODPACK_ZIP_URL:-}"
    MODPACK_ZIP_PATH="${MODPACK_ZIP_PATH:-}"         # optional, but will NOT hard-fail if missing
    CF_API_KEY="${CF_API_KEY:-}"

    FILE_ID="${FILE_ID:-}"
    ZIP="${ZIP:-}"                                   # your env uses ZIP="linggango-v6.4.zip"
    ZIP_NAME="${ZIP_NAME:-}"                         # optional fallback
    MOD_NAME="${MOD_NAME:-}"
    IMAGE_TAG="${IMAGE_TAG:-}"

    MC_VERSION="${MC_VERSION:-1.20.1}"
    FORGE_VERSION="${FORGE_VERSION:-47.4.0}"

    mkdir -p "${DATA_DIR}" "${APP_DIR}"
    log "Using APP_DIR=${APP_DIR} DATA_DIR=${DATA_DIR}"

    ZIP_DIR="${APP_DIR}/mods"
    ZIP_DST=""                                       # set by acquire_zip
    MODPACK_DIR="${DATA_DIR}/.modpack"
    MANIFEST_PATH="${MODPACK_DIR}/manifest.json"
    OVERRIDES_DIR="${MODPACK_DIR}/overrides"

    need java
    need curl
    need unzip
    need python3

    # ------------------------------------------------------------
    # Ensure EULA exists in APP_DIR
    # ------------------------------------------------------------
    ensure_eula() {
      if [[ -f "${APP_DIR}/eula.txt" ]] && grep -q 'eula=true' "${APP_DIR}/eula.txt"; then
        return 0
      fi
      if [[ -f "${IMAGE_MC_HOME}/eula.txt" ]] && grep -q 'eula=true' "${IMAGE_MC_HOME}/eula.txt"; then
        log "EULA: seeding accepted eula.txt from ${IMAGE_MC_HOME} -> ${APP_DIR}"
        cp -f "${IMAGE_MC_HOME}/eula.txt" "${APP_DIR}/eula.txt"
        return 0
      fi
      log "ERROR: eula.txt missing or not accepted in ${APP_DIR} (and no accepted seed found in ${IMAGE_MC_HOME})"
      exit 3
    }

    # ------------------------------------------------------------
    # Install Forge (idempotent) into APP_DIR
    # ------------------------------------------------------------
    FORGE_MARKER="${APP_DIR}/.forge_${MC_VERSION}_${FORGE_VERSION}_installed"

    install_forge_if_needed() {
      if [[ -f "${FORGE_MARKER}" ]]; then
        log "FORGE: already installed (${MC_VERSION}-${FORGE_VERSION}) in ${APP_DIR}"
        return 0
      fi

      log "FORGE: installing ${MC_VERSION}-${FORGE_VERSION} into ${APP_DIR}"
      curl -fL --retry 3 --retry-delay 2 -o /tmp/forge-installer.jar \
        "https://maven.minecraftforge.net/net/minecraftforge/forge/${MC_VERSION}-${FORGE_VERSION}/forge-${MC_VERSION}-${FORGE_VERSION}-installer.jar"

      ( cd "${APP_DIR}" && java -jar /tmp/forge-installer.jar --installServer ) 2>&1 | sed -u 's/^/[FORGE-INSTALL] /'
      rc=${PIPESTATUS[0]}
      rm -f /tmp/forge-installer.jar || true
      [[ "${rc}" -eq 0 ]] || { log "FORGE: installer failed rc=${rc}"; exit "${rc}"; }

      touch "${FORGE_MARKER}"
      log "FORGE: install finished"
    }

    find_forge_unix_args() {
      local base="${APP_DIR}/libraries/net/minecraftforge/forge"
      find "${base}" -maxdepth 4 -type f -name unix_args.txt 2>/dev/null | head -n 1 || true
    }

    # ------------------------------------------------------------
    # Seed ZIP from image (optional)
    # ------------------------------------------------------------
    seed_zip_from_image() {
      mkdir -p "${ZIP_DIR}"

      if [[ -f "${ZIP_DIR}/Linggango.zip" ]]; then
        return 0
      fi

      if [[ -f "${IMAGE_MC_HOME}/mods/Linggango.zip" ]]; then
        log "MODPACK: seeding zip from image -> ${ZIP_DIR}/Linggango.zip"
        cp -f "${IMAGE_MC_HOME}/mods/Linggango.zip" "${ZIP_DIR}/Linggango.zip"
      fi
    }

    # ------------------------------------------------------------
    # Acquire ZIP (URL / derived URL / PATH / fallback)
    # Always normalize to ${ZIP_DIR}/Linggango.zip
    # ------------------------------------------------------------
    acquire_zip() {
      mkdir -p "${ZIP_DIR}" "${DATA_DIR}"

      # 0) If already present in volume, use it
      if [[ -f "${ZIP_DIR}/Linggango.zip" ]]; then
        ZIP_DST="${ZIP_DIR}/Linggango.zip"
        log "MODPACK: using existing ${ZIP_DST}"
        return 0
      fi

      # 1) Explicit URL
      if [[ -n "${MODPACK_ZIP_URL}" ]]; then
        log "MODPACK: downloading from MODPACK_ZIP_URL -> ${ZIP_DIR}/Linggango.zip"
        curl -fL --retry 3 --retry-delay 2 -o "${ZIP_DIR}/Linggango.zip.new" "${MODPACK_ZIP_URL}"
        mv -f "${ZIP_DIR}/Linggango.zip.new" "${ZIP_DIR}/Linggango.zip"
        ZIP_DST="${ZIP_DIR}/Linggango.zip"
        return 0
      fi

      # 2) Derive URL from FILE_ID + ZIP (or ZIP_NAME, or MOD_NAME+IMAGE_TAG)
      local name=""
      if [[ -n "${ZIP}" ]]; then
        name="${ZIP}"
      elif [[ -n "${ZIP_NAME}" ]]; then
        name="${ZIP_NAME}"
      elif [[ -n "${MOD_NAME}" && -n "${IMAGE_TAG}" ]]; then
        name="${MOD_NAME}-${IMAGE_TAG}.zip"
      fi

      if [[ -n "${FILE_ID}" && -n "${name}" ]]; then
        local dir1 dir2 url
        dir1=$(( FILE_ID / 1000 ))
        dir2=$(( FILE_ID % 1000 ))
        url="https://mediafilez.forgecdn.net/files/${dir1}/${dir2}/${name}"

        log "MODPACK: downloading from derived URL -> ${ZIP_DIR}/Linggango.zip"
        log "MODPACK: url=${url}"
        curl -fL --retry 3 --retry-delay 2 \
          -A "Mozilla/5.0" \
          -H "Referer: https://www.curseforge.com/" \
          -H "Accept: */*" \
          -o "${ZIP_DIR}/Linggango.zip.new" "${url}"
        mv -f "${ZIP_DIR}/Linggango.zip.new" "${ZIP_DIR}/Linggango.zip"
        ZIP_DST="${ZIP_DIR}/Linggango.zip"
        return 0
      fi

      # 3) Optional PATH (do not hard-fail if missing)
      if [[ -n "${MODPACK_ZIP_PATH}" ]]; then
        if [[ -f "${MODPACK_ZIP_PATH}" ]]; then
          log "MODPACK: using zip from MODPACK_ZIP_PATH -> ${ZIP_DIR}/Linggango.zip"
          cp -f "${MODPACK_ZIP_PATH}" "${ZIP_DIR}/Linggango.zip"
          ZIP_DST="${ZIP_DIR}/Linggango.zip"
          return 0
        fi
        log "MODPACK: WARN MODPACK_ZIP_PATH not found: ${MODPACK_ZIP_PATH} -> ignoring"
      fi

      # 4) Fallback: any .zip in ZIP_DIR
      local fallback
      fallback="$(ls -1t "${ZIP_DIR}"/*.zip 2>/dev/null | head -n 1 || true)"
      if [[ -n "${fallback}" ]]; then
        ZIP_DST="${fallback}"
        log "MODPACK: fallback to newest zip in ${ZIP_DIR}: ${ZIP_DST}"
        return 0
      fi

      log "ERROR: No modpack zip found. Provide MODPACK_ZIP_URL or FILE_ID+ZIP (or MOD_NAME+IMAGE_TAG)."
      exit 1
    }

    # ------------------------------------------------------------
    # Main flow
    # ------------------------------------------------------------
    ensure_eula
    install_forge_if_needed

    FORGE_UNIX_ARGS="$(find_forge_unix_args)"
    if [[ -z "${FORGE_UNIX_ARGS}" ]]; then
      log "ERROR: Forge unix_args not found under ${APP_DIR}/libraries/net/minecraftforge/forge/**/unix_args.txt"
      ls -la "${APP_DIR}/libraries/net/minecraftforge/forge" 2>/dev/null || true
      exit 1
    fi
    log "Forge unix_args: ${FORGE_UNIX_ARGS}"

    seed_zip_from_image
    acquire_zip

    if [[ ! -f "${ZIP_DST}" ]]; then
      log "ERROR: ZIP_DST does not exist after acquire_zip: ${ZIP_DST}"
      exit 1
    fi

    ZIP_HASH="$(sha256sum "${ZIP_DST}" | awk '{print $1}')"
    INIT_MARKER="${DATA_DIR}/.modpack_initialized_${ZIP_HASH}"

    # 1) (Re-)Init when zip changed (hash marker)
    if [[ ! -f "${INIT_MARKER}" ]]; then
      log "MODPACK: new zip detected (hash=${ZIP_HASH}) -> re-initializing"_
