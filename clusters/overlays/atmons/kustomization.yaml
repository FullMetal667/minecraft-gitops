apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: minecraft-atmons
resources:
  - ../../base
#  - namespace.yaml
  - cm-mcrcon.yaml
  - cm-server-properties.yaml
  - cm-user-jvm-args.yaml
  - cm-startserver.yaml
  - deployment.yaml
secretGenerator:
  - name: mc-env
    envs:
      - mc-env.env
generatorOptions:
  disableNameSuffixHash: true
patches:
  - path: patch-resources.yaml
    target:
      kind: Deployment
      name: all-the-mods-10
      namespace: minecraft-atmons
  - path: patch-delete-minecraft-container.yaml
    target:
      name: all-the-mods-10
      namespace: minecraft-atmons
images: 
  - name: docker.io/chrisroth667/minecraft
    newName: docker.io/chrisroth667/atmons
    newTag: "1.0.0-rc.2"
