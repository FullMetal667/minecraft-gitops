apiVersion: apps/v1
kind: Deployment
metadata:
  name: all-the-mons
  namespace: minecraft-atmons
spec:
  template:
    spec:
      containers:
      - name: minecraft
        resources:
          requests:
            cpu: "4"
            memory: "12Gi"
          limits:
            cpu: "8"
            memory: "24Gi"
