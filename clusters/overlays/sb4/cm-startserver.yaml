kind: ConfigMap
apiVersion: v1
metadata:
  name: install
data:
  install.sh: |
    #!/usr/bin/env bash

    set -euo pipefail

    pack_id="130"
    version_id="100152"

    base_url="https://github.com/FTBTeam/FTB-Server-Installer/releases/latest/download/ftb-server-"

    # RCON
    RCON_ENABLE="${RCON_ENABLE:-true}"
    RCON_HOST="${RCON_HOST:-127.0.0.1}"
    RCON_PORT="${RCON_PORT:-25575}"
    RCON_PASSWORD="${RCON_PASSWORD:-mc321}"

    # Backup-Mod Auswahl: advanced | none
    BACKUP_MOD="${BACKUP_MOD:-advanced}"

    # AdvancedBackups Defaults (per ENV overridebar)
    AB_FILE_ID="${AB_FILE_ID:-4818556}"
    AB_FILE_NAME="${AB_FILE_NAME:-AdvancedBackups-fabric-1.20-3.2.1.jar}"
    AB_DIR1=$(( AB_FILE_ID / 1000 ))
    AB_DIR2=$(( AB_FILE_ID % 1000 ))
    ADVANCED_BACKUPS_URL="${ADVANCED_BACKUPS_URL:-https://mediafilez.forgecdn.net/files/${AB_DIR1}/${AB_DIR2}/${AB_FILE_NAME}}"

    # nc / ncat detection
    NC_BIN="${NC_BIN:-nc}"
    if ! command -v "${NC_BIN}" >/dev/null 2>&1; then
      if command -v ncat >/dev/null 2>&1; then
        NC_BIN="ncat"
      fi
    fi

    commandAvailable() {
      command -v "$1" >/dev/null 2>&1
    }

    INSTALL_DIR=/data

    choose_install_dir() {
      # 1. explizit gesetztes INSTALL_DIR
      if [ -n "${INSTALL_DIR}" ]; then
        if mkdir -p "${INSTALL_DIR}" 2>/dev/null && [ -w "${INSTALL_DIR}" ]; then
          echo "${INSTALL_DIR}"
          return 0
        else
          echo "[ERR] INSTALL_DIR='${INSTALL_DIR}' ist nicht beschreibbar." >&2
          return 1
        fi
      fi

      # 2. ein paar sinnvolle Defaults durchprobieren
      for d in /server /data /srv/minecraft; do
        if mkdir -p "${d}" 2>/dev/null && [ -w "${d}" ]; then
          echo "${d}"
          return 0
        fi
      done

      # 3. fallback: aktuelles Verzeichnis, falls beschreibbar
      if [ -w "." ]; then
        pwd
        return 0
      fi

      echo "[ERR] Kein beschreibbares Installationsverzeichnis gefunden. Setze INSTALL_DIR." >&2
      return 1
    }

    WORKDIR="$(choose_install_dir)"
    echo "Using install dir: ${WORKDIR}"
    cd "${WORKDIR}"

    pack_id="130"
    version_id="100152"

    base_url="https://github.com/FTBTeam/FTB-Server-Installer/releases/latest/download/ftb-server-"

    os_name=$(uname -s | tr '[:upper:]' '[:lower:]')

    target_name=linux
    if [ "$os_name" = "linux" ]; then
      target_name="linux"
    elif [ "$os_name" = "darwin" ]; then
      target_name="darwin"
    elif [ "$os_name" = "freebsd" ]; then
      target_name="freebsd"
    else
      echo "Unsupported operating system: $os_name"
      exit 1
    fi

    arch_name=$(uname -m | tr '[:upper:]' '[:lower:]')

    if [ "$arch_name" = "x86_64" ] || [ "$arch_name" = "amd64" ] || [ "$arch_name" = "i386" ]; then
      arch_name="amd64"
    elif [ "$arch_name" = "aarch64" ] || [ "$arch_name" = "arm64" ]; then
      arch_name="arm64"
    else
      echo "Unsupported architecture: $arch_name"
      exit 1
    fi

    echo "Detected OS: $os_name"
    echo "Detected Architecture: $arch_name"
    echo "Pack ID: $pack_id"
    echo "Version ID: $version_id"
    echo "Target Name: $target_name"

    download_url="${base_url}${target_name}-${arch_name}"
    outname="ftb-server-installer_${pack_id}_${version_id}"

    if [ "$pack_id" = "REPLACE_ME" ] || [ "$version_id" = "REPLACE_ME" ]; then
      outname="ftb-server-installer"
    fi

    echo "Downloading FTB Server Installer for $os_name ($arch_name) from $download_url"
    echo "Target file: ${WORKDIR}/${outname}"

    if command -v curl >/dev/null 2>&1; then
      curl -L "$download_url" -o "$outname" || { echo "Failed to download file"; exit 1; }
      chmod +x "$outname"
    elif command -v wget >/dev/null 2>&1; then
      wget "$download_url" -O "$outname" || { echo "Failed to download file"; exit 1; }
      chmod +x "$outname"
    else
      echo "Neither curl nor wget is installed. Please install one of them to proceed."
      exit 1
    fi

    echo "Download complete."
    echo "You can now run the installer with: ${WORKDIR}/${outname}"

    selected_backup_filename() {
      case "${BACKUP_MOD}" in
        advanced) echo "${AB_FILE_NAME}" ;;
        none|"")  echo "" ;;
      esac
    }

    selected_backup_url() {
      case "${BACKUP_MOD}" in
        advanced) echo "${ADVANCED_BACKUPS_URL}" ;;
        none|"")  echo "" ;;
      esac
    }

    # server.properties-Key setzen oder überschreiben
    _set_prop() {
      local key="$1" value="$2" file="$3"
      if grep -qE "^${key}=" "${file}" 2>/dev/null; then
        sed -i "s#^${key}=.*#${key}=${value}#" "${file}"
      else
        echo "${key}=${value}" >> "${file}"
      fi
    }

    configure_rcon_server_properties() {
      if [[ "${RCON_ENABLE}" != "true" ]]; then
        echo "[RCON] disabled via RCON_ENABLE=${RCON_ENABLE}"
        return 0
      fi

      if [[ ! -f server.properties ]]; then
        echo "[RCON] server.properties nicht vorhanden – lege Minimaldatei an."
        touch server.properties
      fi

      _set_prop "enable-rcon"   "true"             server.properties
      _set_prop "rcon.port"     "${RCON_PORT}"     server.properties
      _set_prop "rcon.password" "${RCON_PASSWORD}" server.properties
      _set_prop "enable-query"  "false"            server.properties

      echo "[RCON] RCON in server.properties aktiviert (port=${RCON_PORT})"
    }

    stage_backup_mod() {
      local fname url src=""
      fname="$(selected_backup_filename)"
      url="$(selected_backup_url)"
      [[ -n "${fname}" ]] || return 0

      mkdir -p overrides/mods mods

      if [[ -f "overrides/mods/${fname}" ]]; then
        return 0
      fi

      if   [[ -f "extras/${fname}" ]]; then
        src="extras/${fname}"
      elif [[ -f "${fname}" ]]; then
        src="${fname}"
      fi

      if [[ -z "${src}" && -n "${url}" ]]; then
        echo "[BK] downloading ${fname} from ${url}"
        if commandAvailable curl ; then
          if ! curl -fsSL "${url}" -o "overrides/mods/${fname}"; then
            echo "[BK] WARN: download failed for ${fname} (continuing)"
            return 0
          fi
        elif commandAvailable wget ; then
          if ! wget -q -O "overrides/mods/${fname}" "${url}"; then
            echo "[BK] WARN: download failed for ${fname} (continuing)"
            return 0
          fi
        else
          echo "[BK] WARN: neither curl nor wget available – skipping backup mod download"
          return 0
        fi
        return 0
      fi

      if [[ -n "${src}" ]]; then
        cp -f "${src}" "overrides/mods/${fname}" || true
      fi
    }

    place_backup_mod() {
      local fname src=""
      fname="$(selected_backup_filename)"
      [[ -n "${fname}" ]] || return 0

      if   [[ -f "overrides/mods/${fname}" ]]; then
        src="overrides/mods/${fname}"
      elif [[ -f "extras/${fname}" ]]; then
        src="extras/${fname}"
      elif [[ -f "${fname}" ]]; then
        src="${fname}"
      fi

      if [[ -n "${src}" ]]; then
        mkdir -p mods
        cp -f "${src}" "mods/${fname}" || true
        echo "[BK] AdvancedBackups im mods/-Ordner platziert: ${fname}"
      fi
    }

    send_rcon_commands() {
      local COMMANDS_FILE="${COMMANDS_FILE:-commands.txt}"
      local RCON_WAIT_SECS="${RCON_WAIT_SECS:-600}"
      local RCON_POLL_INTERVAL="${RCON_POLL_INTERVAL:-5}"

      if [[ "${RCON_ENABLE}" != "true" ]]; then
        echo "[RCON] disabled via RCON_ENABLE=${RCON_ENABLE}"
        return 0
      fi

      if [[ ! -s "${COMMANDS_FILE}" ]]; then
        echo "[RCON] no commands file '${COMMANDS_FILE}' – skipping"
        return 0
      fi

      if ! command -v /usr/local/bin/mcrcon >/dev/null 2>&1; then
        echo "[RCON] /usr/local/bin/mcrcon not found – skipping"
        return 0
      fi

      echo "[RCON] waiting for ${RCON_HOST}:${RCON_PORT} (timeout ${RCON_WAIT_SECS}s) ..."
      local waited=0

      while (( waited < RCON_WAIT_SECS )); do
        if command -v "${NC_BIN}" >/dev/null 2>&1 && \
          ${NC_BIN} -z "${RCON_HOST}" "${RCON_PORT}" 2>/dev/null; then
          echo "[RCON] RCON port is up"
          break
        fi
        sleep "${RCON_POLL_INTERVAL}"
        waited=$(( waited + RCON_POLL_INTERVAL ))
      done

      if (( waited >= RCON_WAIT_SECS )); then
        echo "[RCON] timeout after ${RCON_WAIT_SECS}s – skipping commands"
        return 0
      fi

      sleep 3
      echo "[RCON] sending commands from ${COMMANDS_FILE}"

      sed -e 's#^/##' -e '/^\s*#/d' -e '/^\s*$/d' "${COMMANDS_FILE}" | \
        /usr/local/bin/mcrcon \
          -H "${RCON_HOST}" \
          -P "${RCON_PORT}" \
          -p "${RCON_PASSWORD}" \
          -s || echo "[RCON] mcrcon returned non-zero (some commands may have failed)"
    }

    os_name=$(uname -s | tr '[:upper:]' '[:lower:]')

    target_name=linux
    if [ "$os_name" = "linux" ]; then
      target_name="linux"
    elif [ "$os_name" = "darwin" ]; then
      target_name="darwin"
    elif [ "$os_name" = "freebsd" ]; then
      target_name="freebsd"
    else
      echo "Unsupported operating system: $os_name"
      exit 1
    fi

    arch_name=$(uname -m | tr '[:upper:]' '[:lower:]')

    if [ "$arch_name" = "x86_64" ] || [ "$arch_name" = "amd64" ] || [ "$arch_name" = "i386" ]; then
      arch_name="amd64"
    elif [ "$arch_name" = "aarch64" ] || [ "$arch_name" = "arm64" ]; then
      arch_name="arm64"
    else
      echo "Unsupported architecture: $arch_name"
      exit 1
    fi

    echo "Detected OS: $os_name"
    echo "Detected Architecture: $arch_name"
    echo "Pack ID: $pack_id"
    echo "Version ID: $version_id"
    echo "Target Name: $target_name"

    download_url="${base_url}${target_name}-${arch_name}"
    outname="ftb-server-installer_${pack_id}_${version_id}"

    if [ "$pack_id" = "REPLACE_ME" ] || [ "$version_id" = "REPLACE_ME" ]; then
      outname="ftb-server-installer"
    fi

    echo "Downloading FTB Server Installer for $os_name ($arch_name) from $download_url"

    if command -v curl >/dev/null 2>&1; then
      curl -L "$download_url" -o "$outname" || { echo "Failed to download file"; exit 1; }
      chmod +x "$outname"
    elif command -v wget >/dev/null 2>&1; then
      wget "$download_url" -O "$outname" || { echo "Failed to download file"; exit 1; }
      chmod +x "$outname"
    else
      echo "Neither curl nor wget is installed. Please install one of them to proceed."
      exit 1
    fi

    # AdvancedBackups vorbereiten und ins mods/-Verzeichnis legen
    stage_backup_mod
    place_backup_mod

    # RCON-Settings ggf. schon mal in server.properties schreiben, falls vorhanden/gewünscht
    configure_rcon_server_properties || true

    echo "Download complete. You can now run the installer with ./$outname"

    ./$outname --auto --force
