apiVersion: batch/v1
kind: CronJob
metadata:
  name: release-watcher
spec:
  schedule: "*/15 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: watcher
              image: chrisroth667/minecraft-gitops:latest
              command:
                - /bin/sh
                - -c
                - |
                  git config --global --add safe.directory /opt/minecraft-gitops
                  exec python3 scripts/release_watcher.py
              envFrom:
                - secretRef:
                    name: minecraft-gitops-secrets
                - configMapRef:
                    name: minecraft-gitops-config
              volumeMounts:
                - name: state
                  mountPath: /data/state
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: minecraft-gitops-state