name: Build & Rollout Minecraft from params

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "build/params-*.env"

permissions:
  contents: write

jobs:
  build-and-rollout:
    runs-on: ubuntu-latest

    env:
      OCP_API_URL: ${{ secrets.OCP_API_URL }}
      OCP_TOKEN:   ${{ secrets.OCP_TOKEN }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      BEFORE_SHA:  ${{ github.event.before }}
      AFTER_SHA:   ${{ github.sha }}

    strategy:
      matrix:
        modpack: [aof7, atm10, bmc4, sb4, ssv3, linggango]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if params file exists for this modpack
        id: params-file
        run: |
          FILE="build/params-${{ matrix.modpack }}.env"
          if [ -f "$FILE" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "file=$FILE" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if params changed for this modpack
        id: params-changed
        run: |
          FILE="build/params-${{ matrix.modpack }}.env"
          echo "Checking if $FILE was changed between $BEFORE_SHA and $AFTER_SHA"

          if git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" | grep -q "^$FILE$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "$FILE was changed."
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "$FILE was NOT changed."
          fi

      - name: Skip if no params or not changed
        if: steps.params-file.outputs.exists != 'true' || steps.params-changed.outputs.changed != 'true'
        run: echo "No params or unchanged for ${{ matrix.modpack }}, skipping."

      - name: Load params
        if: steps.params-file.outputs.exists == 'true' && steps.params-changed.outputs.changed == 'true'
        id: params
        run: |
          echo "Loading ${{ steps.params-file.outputs.file }}"
          set -a
          source "${{ steps.params-file.outputs.file }}"
          set +a

          echo "mod_name=${MOD_NAME}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "git_url=${GIT_URL}" >> $GITHUB_OUTPUT
          echo "git_revision=${GIT_REVISION}" >> $GITHUB_OUTPUT
          echo "context_dir=${CONTEXT_DIR}" >> $GITHUB_OUTPUT
          echo "docker_repo=${DOCKER_REPO}" >> $GITHUB_OUTPUT
          echo "file_id=${FILE_ID}" >> $GITHUB_OUTPUT
          echo "zip=${ZIP}" >> $GITHUB_OUTPUT
          echo "dir=${DIR}" >> $GITHUB_OUTPUT

      - name: Generate mc-env.env from params
        if: steps.params-file.outputs.exists == 'true' && steps.params-changed.outputs.changed == 'true'
        run: |
          MOD_NAME="${{ steps.params.outputs.mod_name }}"
          bash build/render-mc-env.sh \
            "${{ steps.params-file.outputs.file }}" \
            "clusters/overlays/${MOD_NAME}/mc-env.env"

      - name: Install oc
        if: steps.params-file.outputs.exists == 'true' && steps.params-changed.outputs.changed == 'true'
        uses: redhat-actions/oc-installer@v1

      - name: Login to OpenShift
        if: steps.params-file.outputs.exists == 'true' && steps.params-changed.outputs.changed == 'true'
        run: |
          echo "Logging in to $OCP_API_URL"
          oc login "$OCP_API_URL" \
            --token="$OCP_TOKEN" \
            --insecure-skip-tls-verify=true

          NS="minecraft-${{ steps.params.outputs.mod_name }}"
          echo "Using namespace: $NS"

          # Projekt setzen, damit nachfolgende oc-Befehle im richtigen NS sind
          oc project "$NS"

      - name: Process build template
        if: steps.params-file.outputs.exists == 'true' && steps.params-changed.outputs.changed == 'true'
        run: |
          set -a
          source "${{ steps.params-file.outputs.file }}"
          set +a

          oc process -f apps/minecraft-image-build.yaml \
            --param MOD_NAME="$MOD_NAME" \
            --param IMAGE_TAG="$IMAGE_TAG" \
            --param GIT_URL="$GIT_URL" \
            --param GIT_REVISION="$GIT_REVISION" \
            --param CONTEXT_DIR="$CONTEXT_DIR" \
            --param FILE_ID="$FILE_ID" \
            --param ZIP="$ZIP" \
            --param DIR="$DIR" \
            --param DOCKER_REPO="$DOCKER_REPO" \
            --param WEBHOOK_SECRET="$WEBHOOK_SECRET" \
            | oc apply -n "minecraft-$MOD_NAME" -f -

      - name: Start build and wait
        if: steps.params-file.outputs.exists == 'true' && steps.params-changed.outputs.changed == 'true'
        run: |
          NS="minecraft-${{ steps.params.outputs.mod_name }}"
          BUILD_NAME="${{ steps.params.outputs.mod_name }}-${{ steps.params.outputs.image_tag }}"

          echo "Starting build $BUILD_NAME in namespace $NS"
          oc start-build "$BUILD_NAME" -n "$NS" --wait --follow

      - name: Update kustomization image tag in Git
        if: steps.params-file.outputs.exists == 'true' && steps.params-changed.outputs.changed == 'true'
        run: |
          set -euo pipefail

          MOD_NAME="${{ steps.params.outputs.mod_name }}"
          TAG="${{ steps.params.outputs.image_tag }}"

          KUSTOM_FILE="clusters/overlays/${MOD_NAME}/kustomization.yaml"
          ENV_FILE="clusters/overlays/${MOD_NAME}/mc-env.env"

          echo "Updating image tag in $KUSTOM_FILE to ${TAG}"
          sed -i "s#^\(\s*newTag:\s*\).*#\1\"${TAG}\"#" "$KUSTOM_FILE"

          echo "Git status before add:"
          git status --short

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$KUSTOM_FILE" "$ENV_FILE"

          echo "Git status after add:"
          git status --short

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(${MOD_NAME}): bump image tag to ${TAG} and regenerate mc-env"

          echo "Git status after commit:"
          git status --short

          BRANCH="${GITHUB_REF_NAME#refs/heads/}"
          echo "Rebasing onto origin/${BRANCH}..."
          git pull --rebase origin "$BRANCH"

          echo "Pushing changes..."
          git push origin "$BRANCH"
